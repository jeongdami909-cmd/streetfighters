<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Nexus Strike: Dragon's Roar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#ff007f", "accent": "#00f2ff", "bg-dark": "#0a0a0c" } } } }
    </script>
    <style>
        html, body { height: 100dvh; margin: 0; padding: 0; background: #0a0a0c; overflow: hidden; touch-action: none; font-family: 'Public Sans', sans-serif; }
        canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; image-rendering: pixelated; object-fit:contain; }
        #ui-layer { position: relative; z-index: 50; width: 100%; height: 100dvh; pointer-events: none; }
        .interactive { pointer-events: auto; touch-action: manipulation; }
        .btn:active { transform: scale(0.9); filter: brightness(1.5); }
    </style>
</head>
<body class="bg-bg-dark text-white select-none">

    <div id="loading-gate" class="fixed inset-0 z-[200] bg-bg-dark flex flex-col items-center justify-center">
        <p class="text-accent text-xl font-black italic animate-pulse uppercase">Syncing Dragon Spirit...</p>
    </div>

    <div id="vs-screen" class="hidden interactive fixed inset-0 z-[100] bg-bg-dark flex flex-col items-center justify-center min-h-[100dvh]">
        <h1 class="text-5xl font-black italic text-white mb-12">NEXUS STRIKE</h1>
        <div class="flex gap-10 items-center mb-12">
            <div class="text-center">
                <div class="size-40 border-2 border-accent rounded-2xl bg-cover bg-center shadow-[0_0_40px_rgba(0,242,255,0.4)]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD_8mhVTPsrVNdoaznLKgKKvgYwxntgmix1TrjDFGV6V2JfjXq1_gp_xpNJQxuF37ODlgoD-2wELp5CsI3I2xKWJo_KtHDFfWWqz42LmZeTvSerokWuLhP0HRdvnrCwx-gsvzQkXMEYFXOG9FlWizjRSEuzaIq1-s1sHu5vO2V1lARYrKrQN9yyNPLbTP4vgbVy6btjiu2DH9WKyzIoK7oPiXo0JD6IdyXicxeeUN8Ifwibans2QTTxgQbPwv0wOUdoxvLPSLszzPM');"></div>
                <h2 class="text-3xl font-black mt-4 text-accent">NINJA</h2>
            </div>
            <div class="text-4xl font-black italic text-gray-500">VS</div>
            <div class="text-center">
                <div class="size-40 border-2 border-primary rounded-2xl bg-cover bg-center shadow-[0_0_40px_rgba(255,0,127,0.4)]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA3zca7hvTLbLxDRhFxSGls-9so22b2Vcd6qNgq7E6x70DSkDL59jt9QvV8-GHL4KUL8SxcFlH_4hkysCplf_mYGhu9EJsIa6sUDtSKfn6Lxa5xJBiIhm1zyE4lnfJckBIMFaPLwQG37NH9KmXufZzVB5bpKkxTRqQ16OnXp9DFn06F3jcXEksOTBpVmS81cCKxt0qfEgMeveGiXQkR-vN4AK834nWP72o48fGvep0h8aYYgpJ_xV76PpwHk657TDEY-F1U9m3MU3U');"></div>
                <h2 class="text-3xl font-black mt-4 text-primary">DRAGON</h2>
            </div>
        </div>
        <button id="start-btn" class="px-16 py-6 bg-accent text-black font-black text-2xl rounded-xl shadow-[0_0_50px_#00f2ff] uppercase italic">FIGHT START</button>
    </div>

    <div id="ui-layer" class="hidden flex flex-col justify-between p-8">
        <div id="hud" class="w-full flex justify-between pointer-events-none mt-2">
            <div class="w-[40%]">
                <div class="flex justify-between font-black italic text-xs text-accent mb-1"><span>P1: NINJA</span><span id="p1-hp-txt">100%</span></div>
                <div class="h-5 bg-black border-2 border-accent/50 rounded-sm"><div id="p1-hp" class="h-full bg-accent transition-all" style="width: 100%"></div></div>
            </div>
            <div class="bg-black/90 border-x-4 border-accent px-6 py-1"><h2 id="timer" class="text-white text-4xl font-black italic">99</h2></div>
            <div class="w-[40%] text-right">
                <div class="flex justify-between flex-row-reverse font-black italic text-xs text-primary mb-1"><span>CPU: DRAGON</span><span id="p2-hp-txt">100%</span></div>
                <div class="h-5 bg-black border-2 border-primary/50 rounded-sm flex flex-row-reverse"><div id="p2-hp-bar" class="h-full bg-primary transition-all" style="width: 100%"></div></div>
            </div>
        </div>

        <div id="controls" class="absolute bottom-8 inset-x-8 flex justify-between items-end">
            <div class="grid grid-cols-3 gap-4 interactive">
                <div></div><button id="up" class="btn w-16 h-16 bg-white/10 border border-white/20 rounded-2xl text-white text-2xl">▲</button><div></div>
                <button id="left" class="btn w-16 h-16 bg-white/10 border border-white/20 rounded-2xl text-white text-2xl">◀</button>
                <button id="down" class="btn w-16 h-16 bg-white/10 border border-white/20 rounded-2xl text-white text-2xl">▼</button>
                <button id="right" class="btn w-16 h-16 bg-white/10 border border-white/20 rounded-2xl text-white text-2xl">▶</button>
            </div>
            <div class="flex gap-6 interactive">
                <button id="btn-p" class="btn w-24 h-24 rounded-full border-4 border-accent bg-black/80 text-accent font-black text-4xl shadow-[0_0_20px_rgba(0,242,255,0.4)]">P</button>
                <button id="btn-k" class="btn w-24 h-24 rounded-full border-4 border-primary bg-black/80 text-primary font-black text-4xl shadow-[0_0_20px_rgba(255,0,127,0.4)]">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="512" height="288"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 260; 
        const GRAVITY = 0.65;
        const CHAR_WIDTH = 130; 
        const CHAR_HEIGHT = 180; 

        const heldKeys = new Set();
        let hitstop = 0, active = false;
        const sounds = { hit: new Audio('https://actions.google.com/sounds/v1/impacts/crash_metal.ogg') };

        const P1_IMG = new Image(); const P2_IMG = new Image(); const BG_IMG = new Image();
        
        // 🛠️ 무한 로딩 강제 돌파 Failsafe
        let isBooted = false;
        const bootGame = () => {
            if(isBooted) return;
            isBooted = true;
            document.getElementById("loading-gate").classList.add("hidden");
            document.getElementById("vs-screen").classList.remove("hidden");
        };

        let loaded = 0;
        const tick = () => { if (++loaded === 3) bootGame(); };
        P1_IMG.onload = P1_IMG.onerror = tick;
        P2_IMG.onload = P2_IMG.onerror = tick;
        BG_IMG.onload = BG_IMG.onerror = tick;
        setTimeout(bootGame, 1500); // 1.5초 뒤 무조건 켜짐

        // 🛠️ 진짜 스프라이트 시트 연결!
        P1_IMG.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuD_8mhVTPsrVNdoaznLKgKKvgYwxntgmix1TrjDFGV6V2JfjXq1_gp_xpNJQxuF37ODlgoD-2wELp5CsI3I2xKWJo_KtHDFfWWqz42LmZeTvSerokWuLhP0HRdvnrCwx-gsvzQkXMEYFXOG9FlWizjRSEuzaIq1-s1sHu5vO2V1lARYrKrQN9yyNPLbTP4vgbVy6btjiu2DH9WKyzIoK7oPiXo0JD6IdyXicxeeUN8Ifwibans2QTTxgQbPwv0wOUdoxvLPSLszzPM"; // 사이버 닌자
        P2_IMG.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuA3zca7hvTLbLxDRhFxSGls-9so22b2Vcd6qNgq7E6x70DSkDL59jt9QvV8-GHL4KUL8SxcFlH_4hkysCplf_mYGhu9EJsIa6sUDtSKfn6Lxa5xJBiIhm1zyE4lnfJckBIMFaPLwQG37NH9KmXufZzVB5bpKkxTRqQ16OnXp9DFn06F3jcXEksOTBpVmS81cCKxt0qfEgMeveGiXQkR-vN4AK834nWP72o48fGvep0h8aYYgpJ_xV76PpwHk657TDEY-F1U9m3MU3U"; // 드래곤 스피릿
        BG_IMG.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBdXOXbdlxfv2UK10TPfwto_aSTrzz3gPYFk0_IsVF0uWAYx8XE7j5s1TYIRJKhikoTFfggACAk0P7iNLM5_u1sOfG5L-3Fau4_Mef_i2pmZMIKwKXsxA1Lq97RLyDVRXFePPJAd9NaaTYNDjQj9zDXk7tzO9PXU4GrbIzuF45-LbiRkSNHb9fwThVxs7oPiS0XvdSXBUu8PwJs9H4rscAnaTUUdxIRvPlyRh8IYj5gHfD6RXRnmNxzAblN2NPbWSlIVMbUV3v3YcI"; // 배경

        // 10프레임 액션 매핑
        const FRAME_COUNTS = { idle: 10, walk: 10, jump: 10, punch: 10, kick: 10, roll: 10, hit: 4 };
        const ANIMS = { idle: 0, walk: 1, jump: 2, punch: 3, kick: 4, roll: 5, hit: 0 };

        class Fighter {
            constructor(x, id, img, isPlayer) {
                this.x = x; this.y = GROUND_Y;
                this.vx = 0; this.vy = 0;
                this.hp = 100; this.id = id; this.img = img;
                this.state = "idle"; this.frame = 0; this.timer = 0;
                this.facing = isPlayer ? 1 : -1; this.isPlayer = isPlayer;
            }

            takeDamage(amt, attacker) {
                this.hp = Math.max(0, this.hp - amt); this.state = "hit";
                this.vx = attacker.facing * 12; hitstop = 6; 
                sounds.hit.currentTime = 0; sounds.hit.play().catch(()=>{});
                document.getElementById(this.isPlayer ? "p1-hp" : "p2-hp-bar").style.width = this.hp + "%";
                setTimeout(() => { if(this.hp > 0) this.state = "idle"; }, 300);
            }

            update(opponent) {
                if (this.isPlayer) {
                    if (!["punch", "kick", "roll", "hit"].includes(this.state)) {
                        const L = heldKeys.has("Left"), R = heldKeys.has("Right"), D = heldKeys.has("Down");
                        if (D && (L || R)) { this.state = "roll"; this.vx = (L ? -7 : 7); }
                        else if (L) { this.vx = -6; this.state = "walk"; }
                        else if (R) { this.vx = 6; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                        if (heldKeys.has("Up") && this.y >= GROUND_Y) { this.vy = -16; this.state = "jump"; }
                    }
                } else {
                    const d = Math.abs(this.x - opponent.x);
                    if (d > 120) { this.vx = this.x < opponent.x ? 2.5 : -2.5; this.state = "walk"; }
                    else { this.vx = 0; if(Math.random() < 0.04 && this.state !== "hit") this.attack(opponent, "punch"); else if (this.state !== "hit") this.state = "idle"; }
                }

                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; if(["jump", "roll"].includes(this.state)) this.state = "idle"; }
                this.x = Math.max(30, Math.min(482, this.x));
                if(this.state !== "roll") this.facing = this.x < opponent.x ? 1 : -1;

                // 🛠️ 10프레임 애니메이션 루프 적용
                if (Date.now() - this.timer > 70) {
                    this.frame = (this.frame + 1) % FRAME_COUNTS[this.state];
                    this.timer = Date.now();
                    if (["punch", "kick"].includes(this.state) && this.frame === 0) this.state = "idle";
                }
            }

            attack(target, type) {
                if (["punch", "kick", "hit", "roll"].includes(this.state)) return;
                this.state = type; this.frame = 0;
                if (Math.abs(this.x - target.x) < 120) target.takeDamage(10, this);
            }

            draw() {
                ctx.save(); 
                ctx.translate(this.x, this.y); 
                ctx.scale(this.facing, 1);

                if (this.state === "hit") ctx.filter = "brightness(4)";

                // 🛠️ 512x512 시트 정밀 슬라이싱 렌더링
                if (this.img.complete && this.img.width > 0 && this.img.src !== window.location.href) {
                    const sw = this.img.width / 10; // 10 Frames per row
                    const sh = this.img.height / 8; // 8 Rows estimation
                    const sy = ANIMS[this.state] * sh;
                    const sx = this.frame * sw;
                    
                    // 전신 비율로 화면에 뿌리기
                    ctx.drawImage(this.img, sx, sy, sw, sh, -CHAR_WIDTH/2, -CHAR_HEIGHT, CHAR_WIDTH, CHAR_HEIGHT);
                } else {
                    // 폴백 모드 (이미지 깨짐 대비 휴머노이드)
                    ctx.fillStyle = this.isPlayer ? "#00f2ff" : "#ff007f";
                    ctx.beginPath(); ctx.arc(0, -140, 20, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillRect(-15, -120, 30, 60); 
                    if(this.state==="walk"){ ctx.fillRect(-10, -60, 8, 60); ctx.fillRect(5, -60, 8, 60); }
                    else { ctx.fillRect(-8, -60, 16, 60); }
                    if(this.state==="punch"){ ctx.fillRect(0, -110, 50, 12); }
                    else { ctx.fillRect(-5, -110, 10, 40); }
                }
                ctx.restore();
            }
        }

        let p1, p2;
        function loop() {
            if (hitstop > 0) { hitstop--; requestAnimationFrame(loop); return; }
            ctx.fillStyle = "#0a0a0c"; ctx.fillRect(0, 0, 512, 288); 
            if (BG_IMG.complete && BG_IMG.width > 0 && BG_IMG.src !== window.location.href) ctx.drawImage(BG_IMG, 0, 0, 512, 288);
            
            p1.update(p2); p2.update(p1);
            p1.draw(); p2.draw();
            if (active) requestAnimationFrame(loop);
        }

        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            const press = (e) => { e.preventDefault(); heldKeys.add(key); };
            const release = (e) => { e.preventDefault(); heldKeys.delete(key); };
            el.addEventListener("touchstart", press, { passive: false });
            el.addEventListener("touchend", release, { passive: false });
            el.addEventListener("touchcancel", release, { passive: false });
            el.addEventListener("mousedown", press);
            el.addEventListener("mouseup", release);
            el.addEventListener("mouseleave", release);
        };
        const bindAction = (id, action) => {
            const el = document.getElementById(id);
            const trigger = (e) => { e.preventDefault(); action(); };
            el.addEventListener("touchstart", trigger, { passive: false });
            el.addEventListener("mousedown", trigger);
        };

        document.getElementById("start-btn").onclick = () => {
            document.getElementById("vs-screen").classList.add("opacity-0");
            setTimeout(() => {
                document.getElementById("vs-screen").remove();
                document.getElementById("ui-layer").classList.remove("hidden");
                p1 = new Fighter(120, "NINJA", P1_IMG, true); 
                p2 = new Fighter(390, "DRAGON", P2_IMG, false);
                
                bindBtn("left", "Left"); bindBtn("right", "Right"); 
                bindBtn("up", "Up"); bindBtn("down", "Down");
                bindAction("btn-p", () => p1.attack(p2, "punch"));
                bindAction("btn-k", () => p1.attack(p2, "kick"));
                
                active = true; loop();
            }, 600);
        };
    </script>
</body>
</html>
