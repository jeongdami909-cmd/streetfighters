<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Nexus Strike: Puppet Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#ec5b13", "accent": "#00f2ff", "bg-dark": "#0a0a0c" } } } }
    </script>
    <style>
        html, body { height: 100dvh; margin: 0; padding: 0; background: #0a0a0c; overflow: hidden; touch-action: manipulation; font-family: 'Public Sans', sans-serif; }
        canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; object-fit:contain; }
        #ui-layer { position: relative; z-index: 50; width: 100%; height: 100dvh; pointer-events: auto; }
        .btn:active { background: #00f2ff !important; color: #000 !important; transform: scale(0.9); box-shadow: 0 0 20px #00f2ff; }
        .rival-btn:active { background: #ec5b13 !important; color: #fff !important; }
    </style>
</head>
<body class="bg-bg-dark text-white select-none">

    <div id="loading-gate" class="fixed inset-0 z-[200] bg-bg-dark flex flex-col items-center justify-center">
        <div class="w-64 h-1 bg-white/10 rounded-full mb-4 overflow-hidden"><div id="load-bar" class="h-full bg-accent transition-all duration-300" style="width: 0%"></div></div>
        <p class="text-accent text-sm font-black italic animate-pulse">INITIATING PUPPET ENGINE...</p>
    </div>

    <div id="vs-screen" class="hidden interactive fixed inset-0 z-[100] bg-bg-dark flex flex-col items-center justify-center min-h-[100dvh]">
        <h1 class="text-6xl font-black italic text-accent mb-12">NEXUS STRIKE</h1>
        <div class="flex gap-10 items-center mb-12">
            <div class="text-center">
                <div class="size-40 border-2 border-accent rounded-2xl bg-cover bg-center shadow-[0_0_40px_rgba(0,242,255,0.4)]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD_8mhVTPsrVNdoaznLKgKKvgYwxntgmix1TrjDFGV6V2JfjXq1_gp_xpNJQxuF37ODlgoD-2wELp5CsI3I2xKWJo_KtHDFfWWqz42LmZeTvSerokWuLhP0HRdvnrCwx-gsvzQkXMEYFXOG9FlWizjRSEuzaIq1-s1sHu5vO2V1lARYrKrQN9yyNPLbTP4vgbVy6btjiu2DH9WKyzIoK7oPiXo0JD6IdyXicxeeUN8Ifwibans2QTTxgQbPwv0wOUdoxvLPSLszzPM');"></div>
                <h2 class="text-3xl font-black mt-4 text-accent">NINJA</h2>
            </div>
            <div class="text-4xl font-black italic">VS</div>
            <div class="text-center">
                <div class="size-40 border-2 border-primary rounded-2xl bg-cover bg-center shadow-[0_0_40px_rgba(236,91,19,0.4)]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC6iVUbj_xI23hlisPPukyjOcddT15wi0c5spFmhalGUzvji9FpGecbJpi854c4LCBdmKYBwylbSYrK5VomYncIdWvEqoAhAzsQQYRM7cldEnD03hkhC4czYKZSiShSWfZ_5mQb8R4emLrPqfMNcGIQ4bvPOVWzcWSsHzrCS96OW7RyB8cZ4JH3TUDCShu8wUk0WdKqb0X4080_7HYnxeb1v5_5yilBvPXzQtDE3Dyd8NeMEiuDW8ltUeTLLiryB7z_QBefSzZh3qk');"></div>
                <h2 class="text-3xl font-black mt-4 text-primary">RYU</h2>
            </div>
        </div>
        <button id="start-btn" class="px-16 py-6 bg-accent text-black font-black text-2xl rounded-xl shadow-[0_0_50px_#00f2ff] uppercase italic">System Link Start</button>
    </div>

    <div id="ui-layer" class="hidden">
        <div id="hud" class="absolute top-6 inset-x-10 flex justify-between pointer-events-none">
            <div class="w-[40%]">
                <div class="flex justify-between font-black italic text-xs text-accent mb-1"><span>NINJA</span><span id="p1-hp-txt">100%</span></div>
                <div class="h-5 bg-black border border-accent/40 rounded-sm overflow-hidden"><div id="p1-hp" class="h-full bg-accent transition-all" style="width: 100%"></div></div>
            </div>
            <div class="bg-black/90 border-x-4 border-accent px-6 py-1"><h2 id="timer" class="text-accent text-4xl font-black italic">99</h2></div>
            <div class="w-[40%] text-right">
                <div class="flex justify-between flex-row-reverse font-black italic text-xs text-primary mb-1"><span>RYU</span><span id="p2-hp-txt">100%</span></div>
                <div class="h-5 bg-black border border-primary/40 rounded-sm overflow-hidden flex flex-row-reverse"><div id="p2-hp-bar" class="h-full bg-primary transition-all" style="width: 100%"></div></div>
            </div>
        </div>

        <div id="controls" class="absolute bottom-12 inset-x-8 flex justify-between items-end">
            <div class="grid grid-cols-3 gap-4 interactive">
                <div></div><button id="up" class="btn size-16 bg-white/5 border border-white/20 rounded-2xl text-white">▲</button><div></div>
                <button id="left" class="btn size-16 bg-white/5 border border-white/20 rounded-2xl text-white">◀</button>
                <button id="down" class="btn size-16 bg-white/5 border border-white/20 rounded-2xl text-white">▼</button>
                <button id="right" class="btn size-16 bg-white/5 border border-white/20 rounded-2xl text-white">▶</button>
            </div>
            <div class="flex gap-6 interactive">
                <button id="btn-p" class="btn size-20 rounded-full border-4 border-accent bg-black/70 text-accent font-black italic text-3xl">P</button>
                <button id="btn-k" class="btn rival-btn size-20 rounded-full border-4 border-primary bg-black/70 text-primary font-black italic text-3xl">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="512" height="288"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 240;
        const GRAVITY = 0.65;
        const DRAW_SIZE = 130; // 🛠️ 해결: 이미지를 온전히 담을 수 있는 적정 크기
        const heldKeys = new Set();
        let hitstop = 0, active = false;

        const sounds = { hit: new Audio('https://actions.google.com/sounds/v1/impacts/crash_metal.ogg'), bgm: new Audio('https://actions.google.com/sounds/v1/ambient/dark_scifi_drone.ogg') };
        sounds.bgm.loop = true;

        const P1_IMG = new Image(); const P2_IMG = new Image(); const BG_IMG = new Image();
        let loaded = 0;
        const check = () => { loaded++; document.getElementById("load-bar").style.width = (loaded/3)*100 + "%"; if (loaded === 3) { document.getElementById("loading-gate").classList.add("hidden"); document.getElementById("vs-screen").classList.remove("hidden"); } };
        P1_IMG.onload = P2_IMG.onload = BG_IMG.onload = check;
        
        P1_IMG.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuD_8mhVTPsrVNdoaznLKgKKvgYwxntgmix1TrjDFGV6V2JfjXq1_gp_xpNJQxuF37ODlgoD-2wELp5CsI3I2xKWJo_KtHDFfWWqz42LmZeTvSerokWuLhP0HRdvnrCwx-gsvzQkXMEYFXOG9FlWizjRSEuzaIq1-s1sHu5vO2V1lARYrKrQN9yyNPLbTP4vgbVy6btjiu2DH9WKyzIoK7oPiXo0JD6IdyXicxeeUN8Ifwibans2QTTxgQbPwv0wOUdoxvLPSLszzPM"; // 닌자 (전체 이미지)
        P2_IMG.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuC6iVUbj_xI23hlisPPukyjOcddT15wi0c5spFmhalGUzvji9FpGecbJpi854c4LCBdmKYBwylbSYrK5VomYncIdWvEqoAhAzsQQYRM7cldEnD03hkhC4czYKZSiShSWfZ_5mQb8R4emLrPqfMNcGIQ4bvPOVWzcWSsHzrCS96OW7RyB8cZ4JH3TUDCShu8wUk0WdKqb0X4080_7HYnxeb1v5_5yilBvPXzQtDE3Dyd8NeMEiuDW8ltUeTLLiryB7z_QBefSzZh3qk"; // 류 (전체 이미지)
        BG_IMG.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBdXOXbdlxfv2UK10TPfwto_aSTrzz3gPYFk0_IsVF0uWAYx8XE7j5s1TYIRJKhikoTFfggACAk0P7iNLM5_u1sOfG5L-3Fau4_Mef_i2pmZMIKwKXsxA1Lq97RLyDVRXFePPJAd9NaaTYNDjQj9zDXk7tzO9PXU4GrbIzuF45-LbiRkSNHb9fwThVxs7oPiS0XvdSXBUu8PwJs9H4rscAnaTUUdxIRvPlyRh8IYj5gHfD6RXRnmNxzAblN2NPbWSlIVMbUV3v3YcI"; // 배경

        class Fighter {
            constructor(x, id, img, isPlayer) {
                this.x = x; this.y = GROUND_Y;
                this.vx = 0; this.vy = 0;
                this.hp = 100; this.id = id; this.img = img;
                this.state = "idle"; this.facing = isPlayer ? 1 : -1; this.isPlayer = isPlayer;
                this.actionTimer = 0;
            }

            takeDamage(amt, attacker) {
                this.hp = Math.max(0, this.hp - amt); this.state = "hit";
                this.vx = attacker.facing * 10; hitstop = 6; 
                sounds.hit.currentTime = 0; sounds.hit.play().catch(()=>{});
                document.getElementById(this.isPlayer ? "p1-hp" : "p2-hp-bar").style.width = this.hp + "%";
                setTimeout(() => { if(this.hp > 0) this.state = "idle"; }, 300);
            }

            update(opponent) {
                if (this.isPlayer) {
                    if (!["punch", "kick", "hit"].includes(this.state)) {
                        const L = heldKeys.has("Left"), R = heldKeys.has("Right");
                        if (L) { this.vx = -5; this.state = "walk"; }
                        else if (R) { this.vx = 5; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                        if (heldKeys.has("Up") && this.y >= GROUND_Y) { this.vy = -14; this.state = "jump"; }
                    }
                } else {
                    const d = Math.abs(this.x - opponent.x);
                    if (d > 100) { this.vx = this.x < opponent.x ? 2.5 : -2.5; this.state = "walk"; }
                    else { this.vx = 0; if(Math.random() < 0.03 && this.state !== "hit") this.attack(opponent, "punch"); else if (this.state !== "hit") this.state = "idle"; }
                }

                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; if(this.state === "jump") this.state = "idle"; }
                this.x = Math.max(30, Math.min(482, this.x));
                this.facing = this.x < opponent.x ? 1 : -1;

                if (Date.now() - this.actionTimer > 250 && ["punch", "kick"].includes(this.state)) {
                    this.state = "idle"; // 공격 모션 종료
                }
            }

            attack(target, type) {
                if (["punch", "kick", "hit"].includes(this.state)) return;
                this.state = type; this.actionTimer = Date.now();
                if (Math.abs(this.x - target.x) < 110) target.takeDamage(10, this);
            }

            // 🛠️ 해결: 자르지 않고 통째로 움직이는 퍼펫(Puppet) 렌더링
            draw() {
                ctx.save(); 
                
                // 1. 기본 위치 및 방향
                ctx.translate(this.x, this.y); 
                ctx.scale(this.facing, 1);

                let drawX = -DRAW_SIZE/2;
                let drawY = -DRAW_SIZE;
                let rot = 0;

                // 2. 물리적 상태 애니메이션 (이미지 자체를 변형)
                if (this.state === "walk") {
                    drawY -= Math.abs(Math.sin(Date.now() / 80)) * 12; // 들썩임
                    rot = Math.sin(Date.now() / 120) * 0.1; // 좌우 갸우뚱
                } else if (this.state === "punch") {
                    drawX += 20; // 앞으로 확 튀어나감
                    rot = 0.2;   // 앞으로 기울임
                } else if (this.state === "kick") {
                    drawX += 15;
                    drawY -= 10;
                    rot = -0.15; // 뒤로 살짝 젖힘
                } else if (this.state === "jump") {
                    rot = this.vy * 0.02; // 점프 궤적에 따른 회전
                } else if (this.state === "hit") {
                    drawX -= 10; // 뒤로 밀림
                    rot = -0.3;  // 크게 뒤로 젖혀짐
                    ctx.filter = "brightness(3) contrast(1.5)"; // 피격 이펙트
                } else {
                    // Idle
                    drawY -= Math.sin(Date.now() / 200) * 4; // 숨쉬기
                }

                ctx.rotate(rot);

                if (this.img.complete && this.img.width > 0) {
                    // 🛠️ 조각내지 않고 drawImage로 원본 전체를 출력
                    ctx.drawImage(this.img, drawX, drawY, DRAW_SIZE, DRAW_SIZE);
                } else {
                    ctx.fillStyle = this.isPlayer ? "#00f2ff" : "#ec5b13";
                    ctx.fillRect(-25, -100, 50, 100);
                }
                ctx.restore();
            }
        }

        let p1, p2;
        function loop() {
            if (hitstop > 0) { hitstop--; requestAnimationFrame(loop); return; }
            ctx.drawImage(BG_IMG, 0, 0, 512, 288);
            p1.update(p2); p2.update(p1);
            p1.draw(); p2.draw();
            if (active) requestAnimationFrame(loop);
        }

        const bind = (id, key) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); heldKeys.add(key); };
            el.onpointerup = (e) => { e.preventDefault(); heldKeys.delete(key); };
            el.onpointerleave = (e) => { e.preventDefault(); heldKeys.delete(key); };
        };

        document.getElementById("start-btn").onclick = () => {
            sounds.bgm.play().catch(()=>{});
            document.getElementById("vs-screen").classList.add("opacity-0");
            setTimeout(() => {
                document.getElementById("vs-screen").remove();
                document.getElementById("ui-layer").classList.remove("hidden");
                p1 = new Fighter(120, "NINJA", P1_IMG, true); 
                p2 = new Fighter(390, "RYU", P2_IMG, false);
                bind("left", "Left"); bind("right", "Right"); bind("up", "Up"); bind("down", "Down");
                document.getElementById("btn-p").onpointerdown = () => p1.attack(p2, "punch");
                document.getElementById("btn-k").onpointerdown = () => p1.attack(p2, "kick");
                active = true; loop();
            }, 600);
        };
    </script>
</body>
</html>
