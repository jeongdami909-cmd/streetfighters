<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Nexus Strike: True Visuals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#00f2ff", "accent-pink": "#ff00ea", "background-dark": "#050505" } } } }
    </script>
    <style>
        /* 🛠️ 최종 해결: touch-action 수정 */
        body { background: #050505; overflow: hidden; touch-action: manipulation; font-family: 'Public Sans', sans-serif; }
        canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; image-rendering: pixelated; object-fit:contain; }
        button { touch-action: manipulation; } /* */
        .interactive { pointer-events: auto; z-index: 50; position: relative; }
        .glitch { text-shadow: 2px 0 #ff00ea, -2px 0 #00f2ff; }
    </style>
</head>
<body class="bg-background-dark text-white select-none">

    <div id="vs-screen" class="interactive fixed inset-0 z-[100] bg-background-dark flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="flex gap-10 items-center">
            <div class="text-center">
                <div class="size-60 border-2 border-primary rounded-xl bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAk4gjewnysuC4jHejZLL-CnVyOTKGLTwatIpA1N6bSfDVt2QxdQsW-JaNJNXSglfgIE511mLmoM9gRzh5DfAjIW0pySv397FE4JuzEqlKkxYBRidpoqD-MCKGcr4LoKOcDOnEQ60PQVUWAHOG4Ck6zzAG9T-MVOP7UHqL-BsNPWOvKF9DmjEzDQv-HDWhpuogdk_EIYSzUBbnjaxZnpFhD-0hRgr3mPI7CHsSEDH1qIie5RpW7cvxeBCRBUXtZgfT_F0c0Rl2KJjV1');"></div>
                <h1 class="text-5xl font-black italic mt-4 text-primary glitch">KAI</h1>
            </div>
            <div class="text-8xl font-black italic text-white">VS</div>
            <div class="text-center">
                <div class="size-60 border-2 border-red-500 rounded-xl bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBuPdanKJbkdOYaT3-IZH-6c2_1EH8e9i3hf7xpii8jObmiVU_mGrASl1jNhiLSX1YKFwtgvSa5AEUKH0EqTqe45fhjal-Uz17mMxbkD1VVt8MkemIYtQdtNWZaVxfbPUTTzB9QiMyh88dsk0Sw3jAsr1WQSgIfEXF7QSMHWqP16jSxNzB5pvichtq-MACtTWCnH5De3tJxFRLDmm4kvVcKAZ6LaUGwV98UPGhd9LwQ0fLZY0vXpSkINZ56DL4pqlflBiyG4oDNMTUq');"></div>
                <h1 class="text-5xl font-black italic mt-4 text-red-500">BRUNO</h1>
            </div>
        </div>
        <button id="start-btn" class="mt-12 px-16 py-6 bg-primary text-black font-black text-2xl rounded-lg shadow-[0_0_50px_rgba(0,242,255,0.5)] active:scale-95 transition">SYSTEM BOOT UP</button>
    </div>

    <div id="ui-layer">
        <div id="hud" class="hidden absolute top-0 inset-x-0 p-6 flex justify-between items-start">
            <div class="w-[40%]">
                <div class="flex justify-between font-black italic mb-1 text-primary"><span>KAI</span><span id="p1-hp-txt">100%</span></div>
                <div class="h-4 bg-black/40 border border-white/20"><div id="p1-hp-bar" class="h-full bg-primary transition-all" style="width: 100%"></div></div>
            </div>
            <div class="bg-black/80 border-x-4 border-primary px-6 py-1 text-4xl font-black italic text-primary italic">99</div>
            <div class="w-[40%] text-right">
                <div class="flex justify-between flex-row-reverse font-black italic mb-1 text-red-500"><span>BRUNO</span><span id="p2-hp-txt">100%</span></div>
                <div class="h-4 bg-black/40 border border-white/20 flex flex-row-reverse"><div id="p2-hp-bar" class="h-full bg-red-500 transition-all" style="width: 100%"></div></div>
            </div>
        </div>

        <div id="controls" class="hidden absolute bottom-12 inset-x-0 px-10 flex justify-between items-end">
            <div class="grid grid-cols-3 gap-3 interactive">
                <div></div><button id="up" class="size-16 bg-white/10 rounded-xl border border-white/20 text-white">▲</button><div></div>
                <button id="left" class="size-16 bg-white/10 rounded-xl border border-white/20 text-white">◀</button>
                <button id="down" class="size-16 bg-white/10 rounded-xl border border-white/20 text-white">▼</button>
                <button id="right" class="size-16 bg-white/10 rounded-xl border border-white/20 text-white">▶</button>
            </div>
            <div class="flex gap-6 interactive">
                <button id="btn-p" class="size-20 rounded-full border-4 border-primary bg-black/60 text-primary font-black text-2xl italic">P</button>
                <button id="btn-k" class="size-20 rounded-full border-4 border-accent-pink bg-black/60 text-accent-pink font-black text-2xl italic">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="384" height="224"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 195;
        const GRAVITY = 0.6;
        const heldKeys = new Set();
        let hitstop = 0; let shake = 0;

        // 🛠️ 진짜 이미지 객체 생성
        const SPRITES = {
            bg: new Image(),
            p1: new Image(), // KAI
            p2: new Image()  // BRUNO
        };
        SPRITES.bg.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBqxvGMkpkIc9bUxOOhYj3MALyCCXoUTlWmjgZa_PoaWkrdHXTgZoFK9z3GFLPnQV0gNavZwMzBQu_Yjg6kBDfNkWBP1KCO3PVzqIrVtg7zkxJS2CPQCrc5sMgkebFVy-XDUGDNckTRUQqas54fGjA24j30B13LJhPQ9T3jHYlyuPjq9OIcT41BNPOkWsSFTaOULhPpaVwVeiEHk74KcyZDbB1NIxdoTNBCsJ7xrz77dqbNhBc_lKC4cOWWHsx5OKD53vApgFQU79A";
        SPRITES.p1.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuAk4gjewnysuC4jHejZLL-CnVyOTKGLTwatIpA1N6bSfDVt2QxdQsW-JaNJNXSglfgIE511mLmoM9gRzh5DfAjIW0pySv397FE4JuzEqlKkxYBRidpoqD-MCKGcr4LoKOcDOnEQ60PQVUWAHOG4Ck6zzAG9T-MVOP7UHqL-BsNPWOvKF9DmjEzDQv-HDWhpuogdk_EIYSzUBbnjaxZnpFhD-0hRgr3mPI7CHsSEDH1qIie5RpW7cvxeBCRBUXtZgfT_F0c0Rl2KJjV1"; // VS 화면의 KAI 이미지
        SPRITES.p2.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBuPdanKJbkdOYaT3-IZH-6c2_1EH8e9i3hf7xpii8jObmiVU_mGrASl1jNhiLSX1YKFwtgvSa5AEUKH0EqTqe45fhjal-Uz17mMxbkD1VVt8MkemIYtQdtNWZaVxfbPUTTzB9QiMyh88dsk0Sw3jAsr1WQSgIfEXF7QSMHWqP16jSxNzB5pvichtq-MACtTWCnH5De3tJxFRLDmm4kvVcKAZ6LaUGwV98UPGhd9LwQ0fLZY0vXpSkINZ56DL4pqlflBiyG4oDNMTUq"; // 브루노 이미지

        class Fighter {
            constructor(x, id, img, isPlayer) {
                this.x = x; this.y = GROUND_Y;
                this.vx = 0; this.vy = 0;
                this.hp = 100; this.id = id; this.img = img;
                this.state = "idle"; // idle, walk, jump, punch, kick, hit
                this.facing = isPlayer ? 1 : -1;
                this.isPlayer = isPlayer;
                this.isHit = false;
                this.timer = 0;
            }

            takeDamage(amt, attacker) {
                this.hp = Math.max(0, this.hp - amt);
                this.state = "hit";
                this.vx = attacker.facing * 7; // 넉백 물리 강화
                hitstop = 5; shake = 10; // 타격감 연출
                document.getElementById(this.isPlayer ? "p1-hp-bar" : "p2-hp-bar").style.width = this.hp + "%";
                document.getElementById(this.isPlayer ? "p1-hp-txt" : "p2-hp-txt").innerText = this.hp + "%";
                setTimeout(() => { if(this.hp > 0) this.state = "idle"; else this.state = "down"; }, 300);
            }

            update(opponent) {
                if (this.state === "down") { this.vx = 0; return; }

                if (this.isPlayer) {
                    if (!["punch", "kick", "hit"].includes(this.state)) {
                        const isL = heldKeys.has("Left"); const isR = heldKeys.has("Right");
                        if (isL) { this.vx = -4; this.state = "walk"; }
                        else if (isR) { this.vx = 4; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                        if (heldKeys.has("Up") && this.y >= GROUND_Y) this.vy = -12;
                    }
                } else {
                    // AI 지능형 추격
                    const dist = Math.abs(this.x - opponent.x);
                    if (this.state === "idle" || this.state === "walk") {
                        if (dist > 60) { this.vx = this.x < opponent.x ? 2 : -2; this.state = "walk"; }
                        else { this.vx = 0; if(Math.random() < 0.05) this.attack(opponent); else this.state = "idle"; }
                    }
                }

                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; }
                this.x = Math.max(25, Math.min(359, this.x));
                this.facing = this.x < opponent.x ? 1 : -1;

                if (this.state === "hit" && Date.now() - this.timer > 250) this.state = "idle";
            }

            attack(target) {
                if (["punch", "kick"].includes(this.state)) return;
                this.state = "punch"; this.timer = Date.now();
                if (Math.abs(this.x - target.x) < 55) target.takeDamage(10, this);
                setTimeout(() => { if(this.state === "punch") this.state = "idle"; }, 300);
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.facing, 1);
                
                // 🛠️ 진짜 이미지 드로잉 (네모 탈출!)
                if (this.isHit) { ctx.filter = "brightness(3)"; ctx.translate(Math.random()*4-2, 0); }
                
                // 캐릭터 이미지 출력 (64x64 사이즈 최적화)
                ctx.drawImage(this.img, -32, -64, 64, 64);
                
                // 공격 시 시각적 보정 (그림만 있을 때의 단조로움 해결)
                if (this.state === "punch") {
                    ctx.fillStyle = this.isPlayer ? "#00f2ff55" : "#ff444455";
                    ctx.fillRect(15, -45, 30, 10);
                }
                ctx.restore();
            }
        }

        let p1, p2, active = false;

        function loop() {
            if (hitstop > 0) { hitstop--; requestAnimationFrame(loop); return; }
            ctx.save();
            if (shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.9; }
            
            ctx.drawImage(SPRITES.bg, 0, 0, 384, 224);
            p1.update(p2); p2.update(p1);
            p1.draw(); p2.draw();
            ctx.restore();
            if (active) requestAnimationFrame(loop);
        }

        const bind = (id, key) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); heldKeys.add(key); };
            el.onpointerup = (e) => { e.preventDefault(); heldKeys.delete(key); };
            el.onpointerleave = (e) => { e.preventDefault(); heldKeys.delete(key); };
        };

        document.getElementById("start-btn").onclick = () => {
            document.getElementById("vs-screen").classList.add("opacity-0");
            setTimeout(() => {
                document.getElementById("vs-screen").remove();
                document.getElementById("hud").classList.remove("hidden");
                document.getElementById("controls").classList.remove("hidden");
                p1 = new Fighter(80, "KAI", SPRITES.p1, true);
                p2 = new Fighter(300, "BRUNO", SPRITES.p2, false);
                bind("left", "Left"); bind("right", "Right"); bind("up", "Up");
                document.getElementById("btn-p").onpointerdown = () => p1.attack(p2);
                document.getElementById("btn-k").onpointerdown = () => p1.attack(p2);
                active = true; loop();
            }, 600);
        };
    </script>
</body>
</html>
