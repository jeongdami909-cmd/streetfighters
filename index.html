<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Nexus Strike: Zero Awakened</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#00f3ff", "accent": "#ff00ea", "bg-dark": "#0a0a0c" } } } }
    </script>
    <style>
        /* 🛠️ 최종 모바일 레이아웃: 100dvh */
        html, body { height: 100dvh; margin: 0; padding: 0; background: #0a0a0c; overflow: hidden; touch-action: manipulation; font-family: 'Public Sans', sans-serif; }
        canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; image-rendering: pixelated; object-fit:contain; }
        #ui-layer { position: relative; z-index: 50; width: 100%; height: 100dvh; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .glitch { text-shadow: 2px 0 #ff00ea, -2px 0 #00f3ff; }
        .btn:active { background: #00f3ff !important; color: #000 !important; transform: scale(0.9); }
    </style>
</head>
<body class="bg-bg-dark text-white select-none">

    <div id="vs-screen" class="interactive fixed inset-0 z-[100] bg-bg-dark flex flex-col items-center justify-center min-h-[100dvh]">
        <div class="inline-block px-4 py-1 border border-primary text-primary text-[10px] uppercase font-black mb-4 animate-pulse shadow-[0_0_15px_#00f3ff]">System Online</div>
        <h1 class="text-6xl font-black italic text-white glitch mb-10">ZERO <span class="text-primary">WARRIOR</span></h1>
        <div class="flex gap-10 items-center mb-12">
            <div class="size-48 border-2 border-primary rounded-xl bg-cover bg-center shadow-[0_0_30px_#00f3ff]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA633UoEppwwSVg3E1M7xWbduakTq39rHgMBscyAqtBR4JgqpLqzvigSsHBVb5sKRd04AA1snoxPRbSM0ydSEqeeYGiwi4QRSrEfF-0xJv1d-zRCWv5DVHDuh0o7yMXAPafPBGB42vyUduYwNc4CgJQTkG_T0-DCE5whjTjMAVYIPYsFFqZB2CS0xTEDxG306k0US2DnDUlhQyI5rBHU2-oneLZuyRs6ztFhADdZfEtchoguPCYn4HmLDs3rmeUUbnGul7QR2KM4Nw');"></div>
            <div class="text-5xl font-black italic text-accent italic">VS</div>
            <div class="size-48 border-2 border-slate-700 rounded-xl bg-cover bg-center grayscale opacity-50" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBuPdanKJbkdOYaT3-IZH-6c2_1EH8e9i3hf7xpii8jObmiVU_mGrASl1jNhiLSX1YKFwtgvSa5AEUKH0EqTqe45fhjal-Uz17mMxbkD1VVt8MkemIYtQdtNWZaVxfbPUTTzB9QiMyh88dsk0Sw3jAsr1WQSgIfEXF7QSMHWqP16jSxNzB5pvichtq-MACtTWCnH5De3tJxFRLDmm4kvVcKAZ6LaUGwV98UPGhd9LwQ0fLZY0vXpSkINZ56DL4pqlflBiyG4oDNMTUq');"></div>
        </div>
        <button id="start-btn" class="px-16 py-6 bg-primary text-black font-black text-2xl rounded shadow-[0_0_50px_rgba(0,243,255,0.6)] active:scale-95 transition">BOOT COMBAT MODULES</button>
    </div>

    <div id="ui-layer">
        <div id="hud" class="hidden absolute top-6 inset-x-8 flex justify-between">
            <div class="w-1/3">
                <div class="flex justify-between font-black italic text-[10px] text-primary mb-1"><span>P1: ZERO</span><span id="p1-hp-txt">100%</span></div>
                <div class="h-4 bg-black border border-primary/30"><div id="p1-hp-bar" class="h-full bg-primary" style="width: 100%"></div></div>
            </div>
            <div class="bg-black/80 border-x-4 border-primary px-6 py-1"><h2 id="timer" class="text-primary text-4xl font-black italic">99</h2></div>
            <div class="w-1/3">
                <div class="flex justify-between flex-row-reverse font-black italic text-[10px] text-accent mb-1"><span>CPU: KAEL</span><span id="p2-hp-txt">100%</span></div>
                <div class="h-4 bg-black border border-accent/30 flex flex-row-reverse"><div id="p2-hp-bar" class="h-full bg-accent" style="width: 100%"></div></div>
            </div>
        </div>

        <div id="controls" class="hidden absolute bottom-12 inset-x-8 flex justify-between items-end pointer-events-none">
            <div class="grid grid-cols-3 gap-3 interactive">
                <div></div><button id="up" class="btn size-16 bg-white/5 border border-white/20 rounded-xl text-white">▲</button><div></div>
                <button id="left" class="btn size-16 bg-white/5 border border-white/20 rounded-xl text-white">◀</button>
                <button id="down" class="btn size-16 bg-white/5 border border-white/20 rounded-xl text-white">▼</button>
                <button id="right" class="btn size-16 bg-white/5 border border-white/20 rounded-xl text-white">▶</button>
            </div>
            <div class="flex gap-6 interactive">
                <button id="btn-p" class="btn size-20 rounded-full border-4 border-primary bg-black/60 text-primary font-black italic text-2xl">P</button>
                <button id="btn-k" class="btn size-20 rounded-full border-4 border-accent bg-black/60 text-accent font-black italic text-2xl">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="384" height="224"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 195;
        const GRAVITY = 0.6;
        const SPRITE_SIZE = 64; // 사용자 설정 프레임 크기
        const heldKeys = new Set();
        let hitstop = 0, shake = 0, active = false;

        // 🛠️ 진짜 스프라이트 시트 로드
        const SPRITE_SHEET = new Image();
        SPRITE_SHEET.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuA633UoEppwwSVg3E1M7xWbduakTq39rHgMBscyAqtBR4JgqpLqzvigSsHBVb5sKRd04AA1snoxPRbSM0ydSEqeeYGiwi4QRSrEfF-0xJv1d-zRCWv5DVHDuh0o7yMXAPafPBGB42vyUduYwNc4CgJQTkG_T0-DCE5whjTjMAVYIPYsFFqZB2CS0xTEDxG306k0US2DnDUlhQyI5rBHU2-oneLZuyRs6ztFhADdZfEtchoguPCYn4HmLDs3rmeUUbnGul7QR2KM4Nw";
        const BG_IMG = new Image();
        BG_IMG.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBqxvGMkpkIc9bUxOOhYj3MALyCCXoUTlWmjgZa_PoaWkrdHXTgZoFK9z3GFLPnQV0gNavZwMzBQu_Yjg6kBDfNkWBP1KCO3PVzqIrVtg7zkxJS2CPQCrc5sMgkebFVy-XDUGDNckTRUQqas54fGjA24j30B13LJhPQ9T3jHYlyuPjq9OIcT41BNPOkWsSFTaOULhPpaVwVeiEHk74KcyZDbB1NIxdoTNBCsJ7xrz77dqbNhBc_lKC4cOWWHsx5OKD53vApgFQU79A";

        // 애니메이션 맵핑 (Row index: Idle=0, Walk=1, Jump=2, Punch=3, Kick=4, Roll=5)
        const ANIMS = { idle: 0, walk: 1, jump: 2, punch: 3, kick: 4, roll: 5, hit: 0 };

        class Fighter {
            constructor(x, id, isPlayer) {
                this.x = x; this.y = GROUND_Y;
                this.vx = 0; this.vy = 0;
                this.hp = 100; this.id = id;
                this.state = "idle"; this.frame = 0; this.timer = 0;
                this.facing = isPlayer ? 1 : -1; this.isPlayer = isPlayer;
                this.isHit = false;
            }

            takeDamage(amt, attacker) {
                this.hp = Math.max(0, this.hp - amt); this.state = "hit";
                this.vx = attacker.facing * 8; hitstop = 5; shake = 10;
                document.getElementById(this.isPlayer ? "p1-hp-bar" : "p2-hp-bar").style.width = this.hp + "%";
                document.getElementById(this.isPlayer ? "p1-hp-txt" : "p2-hp-txt").innerText = this.hp + "%";
                setTimeout(() => { if(this.hp > 0) this.state = "idle"; }, 300);
            }

            update(opponent) {
                if (this.isPlayer) {
                    if (!["punch", "kick", "roll", "hit"].includes(this.state)) {
                        const L = heldKeys.has("Left"), R = heldKeys.has("Right"), D = heldKeys.has("Down");
                        if (D && (L || R)) { this.state = "roll"; this.vx = (L ? -6 : 6); }
                        else if (L) { this.vx = -4; this.state = "walk"; }
                        else if (R) { this.vx = 4; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                        if (heldKeys.has("Up") && this.y >= GROUND_Y) { this.vy = -12; this.state = "jump"; }
                    }
                } else {
                    // AI 로직
                    const d = Math.abs(this.x - opponent.x);
                    if (d > 70) { this.vx = this.x < opponent.x ? 1.5 : -1.5; this.state = "walk"; }
                    else { this.vx = 0; if(Math.random() < 0.04) this.attack(opponent, "punch"); else this.state = "idle"; }
                }

                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; if(this.state === "jump") this.state = "idle"; }
                this.x = Math.max(25, Math.min(359, this.x));
                if(this.state !== "roll") this.facing = this.x < opponent.x ? 1 : -1;

                // 🛠️ 6프레임 애니메이션 루프
                if (Date.now() - this.timer > 100) {
                    this.frame = (this.frame + 1) % 6;
                    this.timer = Date.now();
                    if (["punch", "kick", "roll"].includes(this.state) && this.frame === 0) this.state = "idle";
                }
            }

            attack(target, type) {
                if (["punch", "kick", "roll"].includes(this.state)) return;
                this.state = type; this.frame = 0;
                if (Math.abs(this.x - target.x) < 60) target.takeDamage(10, this);
            }

            // 🛠️ 시트 기반 드로잉 (9개 파라미터 모드)
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.facing, 1);
                
                const sy = ANIMS[this.state] * SPRITE_SIZE; // 행 위치
                const sx = this.frame * SPRITE_SIZE;       // 열 위치
                
                if (this.state === "hit") ctx.filter = "brightness(4)";
                
                // 🛠️ drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh)
                if (SPRITE_SHEET.complete) {
                    ctx.drawImage(SPRITE_SHEET, sx, sy, SPRITE_SIZE, SPRITE_SIZE, -32, -64, 64, 64);
                } else {
                    // 폴백: 로딩 중일 때 네온 박스
                    ctx.fillStyle = this.isPlayer ? "#00f3ff" : "#ff00ea";
                    ctx.fillRect(-15, -50, 30, 50);
                }
                ctx.restore();
            }
        }

        let p1, p2;
        function loop() {
            if (hitstop > 0) { hitstop--; requestAnimationFrame(loop); return; }
            ctx.save();
            if (shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.85; }
            ctx.drawImage(BG_IMG, 0, 0, 384, 224);
            p1.update(p2); p2.update(p1);
            p1.draw(); p2.draw();
            ctx.restore();
            if (active) requestAnimationFrame(loop);
        }

        const bind = (id, key) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); heldKeys.add(key); };
            el.onpointerup = (e) => { e.preventDefault(); heldKeys.delete(key); };
        };

        document.getElementById("start-btn").onclick = () => {
            document.getElementById("vs-screen").classList.add("opacity-0");
            setTimeout(() => {
                document.getElementById("vs-screen").remove();
                document.getElementById("hud").classList.remove("hidden");
                document.getElementById("controls").classList.remove("hidden");
                p1 = new Fighter(80, "ZERO", true); p2 = new Fighter(300, "KAEL", false);
                bind("left", "Left"); bind("right", "Right"); bind("up", "Up"); bind("down", "Down");
                document.getElementById("btn-p").onpointerdown = () => p1.attack(p2, "punch");
                document.getElementById("btn-k").onpointerdown = () => p1.attack(p2, "kick");
                active = true; loop();
            }, 600);
        };
    </script>
</body>
</html>
