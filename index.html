<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Nexus Strike: Poster Adaptive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#ff007f", "accent": "#00f2ff", "bg-dark": "#0a0a0c" } } } }
    </script>
    <style>
        html, body { height: 100dvh; margin: 0; padding: 0; background: #0a0a0c; overflow: hidden; touch-action: none; font-family: 'Public Sans', sans-serif; user-select: none; }
        canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; image-rendering: pixelated; object-fit:contain; }
        #ui-layer { position: relative; z-index: 50; width: 100%; height: 100dvh; pointer-events: none; }
        .interactive { pointer-events: auto; touch-action: manipulation; }
        .btn:active { transform: scale(0.95); filter: brightness(1.3); }
    </style>
</head>
<body class="bg-bg-dark text-white">

    <div id="vs-screen" class="interactive fixed inset-0 z-[100] bg-bg-dark flex flex-col items-center justify-center min-h-[100dvh]">
        <h1 class="text-4xl font-black italic text-white mb-10 tracking-tighter">NEXUS STRIKE</h1>
        <button id="start-btn" class="px-12 py-5 bg-accent text-black font-black text-xl rounded-lg shadow-[0_0_40px_#00f2ff] uppercase italic">System Boot</button>
    </div>

    <div id="ui-layer" class="hidden flex flex-col justify-between p-6">
        <div id="hud" class="w-full flex justify-between pointer-events-none mt-2">
            <div class="w-[42%]">
                <div class="flex justify-between font-black italic text-[10px] text-accent mb-1 uppercase"><span>P1: LOTUS</span><span id="p1-hp-txt">100%</span></div>
                <div class="h-4 bg-black border border-accent/40 rounded-sm overflow-hidden"><div id="p1-hp" class="h-full bg-accent transition-all duration-300" style="width: 100%"></div></div>
            </div>
            <div class="bg-black/90 border-x-4 border-accent px-6 py-1"><h2 id="timer" class="text-white text-3xl font-black italic">99</h2></div>
            <div class="w-[42%] text-right">
                <div class="flex justify-between flex-row-reverse font-black italic text-[10px] text-primary mb-1 uppercase"><span>CPU: DRAGON</span><span id="p2-hp-txt">100%</span></div>
                <div class="h-4 bg-black border border-primary/40 rounded-sm overflow-hidden flex flex-row-reverse"><div id="p2-hp-bar" class="h-full bg-primary transition-all duration-300" style="width: 100%"></div></div>
            </div>
        </div>

        <div id="controls" class="absolute bottom-10 inset-x-6 flex justify-between items-end">
            <div class="grid grid-cols-3 gap-2 interactive">
                <div class="w-14"></div><button id="up" class="btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white">▲</button><div class="w-14"></div>
                <button id="left" class="btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white">◀</button><div class="w-14"></div><button id="right" class="btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white">▶</button>
                <div class="w-14"></div><button id="down" class="btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white">▼</button><div class="w-14"></div>
            </div>
            <div class="flex gap-4 interactive mb-2">
                <button id="btn-p" class="btn w-18 h-18 rounded-full border-4 border-accent bg-black/80 text-accent font-black text-2xl">P</button>
                <button id="btn-k" class="btn w-18 h-18 rounded-full border-4 border-primary bg-black/80 text-primary font-black text-2xl">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="512" height="288"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 260; const GRAVITY = 0.65;
        const DRAW_SIZE = 180; // 전신 크기
        const heldKeys = new Set();
        let hitstop = 0, active = false;

        const P1_IMG = new Image(); const P2_IMG = new Image(); 
        const cache = "?v=" + new Date().getTime();
        P1_IMG.src = "lotus.png" + cache; P2_IMG.src = "dragon.png" + cache;

        class Fighter {
            constructor(x, id, img, isPlayer) {
                this.x = x; this.y = GROUND_Y; this.vx = 0; this.vy = 0; this.hp = 100;
                this.img = img; this.state = "idle"; this.facing = isPlayer ? 1 : -1; this.isPlayer = isPlayer;
            }
            takeDamage(amt, attacker) {
                this.hp = Math.max(0, this.hp - amt); this.state = "hit";
                this.vx = attacker.facing * 12; hitstop = 6;
                document.getElementById(this.isPlayer ? "p1-hp" : "p2-hp-bar").style.width = this.hp + "%";
                setTimeout(() => { if(this.hp > 0) this.state = "idle"; }, 300);
            }
            update(opponent) {
                if (this.isPlayer) {
                    if (!["punch", "kick", "hit"].includes(this.state)) {
                        const L = heldKeys.has("Left"), R = heldKeys.has("Right");
                        if (L) { this.vx = -6; this.state = "walk"; }
                        else if (R) { this.vx = 6; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                        if (heldKeys.has("Up") && this.y >= GROUND_Y) { this.vy = -16; this.state = "jump"; }
                    }
                } else {
                    const d = Math.abs(this.x - opponent.x);
                    if (d > 120) { this.vx = this.x < opponent.x ? 2.5 : -2.5; this.state = "walk"; }
                    else { this.vx = 0; if(Math.random() < 0.04 && this.state !== "hit") this.attack(opponent, "punch"); else if (this.state !== "hit") this.state = "idle"; }
                }
                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; if(this.state === "jump") this.state = "idle"; }
                this.x = Math.max(30, Math.min(482, this.x));
                this.facing = this.x < opponent.x ? 1 : -1;
            }
            attack(target, type) { if (["punch", "kick", "hit"].includes(this.state)) return; this.state = type; if (Math.abs(this.x - target.x) < 110) target.takeDamage(10, this); setTimeout(()=>this.state="idle", 250); }
            
            // 🛠️ 해결: 포스터 이미지에서 중앙 캐릭터만 확대해서 보여주는 '줌 렌더링'
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.facing, 1);
                if (this.state === "hit") ctx.filter = "brightness(4)";
                
                if (this.img.complete && this.img.width > 10) {
                    // 포스터의 중앙 영역(캐릭터가 있는 곳)만 캡처해서 그립니다.
                    // 포스터 크기(512)에서 중앙 300px 정도만 잘라내기
                    const cropSize = this.img.width * 0.6; 
                    const cropX = (this.img.width - cropSize) / 2;
                    const cropY = this.img.height * 0.15; // 상단 글자 피하기
                    
                    ctx.drawImage(this.img, cropX, cropY, cropSize, cropSize, -DRAW_SIZE/2, -DRAW_SIZE, DRAW_SIZE, DRAW_SIZE);
                } else {
                    // 파일 없음 경고
                    ctx.fillStyle = this.isPlayer ? "#00f2ff" : "#ff007f";
                    ctx.fillText(this.isPlayer ? "lotus.png?" : "dragon.png?", -30, -100);
                    ctx.fillRect(-20, -80, 40, 80);
                }
                ctx.restore();
            }
        }

        let p1, p2;
        function loop() {
            if (hitstop > 0) { hitstop--; requestAnimationFrame(loop); return; }
            ctx.fillStyle = "#0a0a0c"; ctx.fillRect(0, 0, 512, 288);
            p1.update(p2); p2.update(p1); p1.draw(); p2.draw();
            if (active) requestAnimationFrame(loop);
        }

        const bind = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener("pointerdown", (e) => { e.preventDefault(); heldKeys.add(key); });
            el.addEventListener("pointerup", (e) => { e.preventDefault(); heldKeys.delete(key); });
            el.addEventListener("pointerleave", (e) => { e.preventDefault(); heldKeys.delete(key); });
        };
        document.getElementById("start-btn").onclick = () => {
            document.getElementById("vs-screen").remove();
            document.getElementById("ui-layer").classList.remove("hidden");
            p1 = new Fighter(120, "P1", P1_IMG, true); p2 = new Fighter(390, "CPU", P2_IMG, false);
            bind("up", "Up"); bind("down", "Down"); bind("left", "Left"); bind("right", "Right");
            document.getElementById("btn-p").onpointerdown = () => p1.attack(p2, "punch");
            document.getElementById("btn-k").onpointerdown = () => p1.attack(p2, "kick");
            active = true; loop();
        };
    </script>
</body>
</html>
