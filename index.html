<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>STREET CODING FIGHTER v8.0 - HADOUKEN</title>
<style>
:root { --neon-green: #39ff14; --neon-red: #ff073a; --neon-blue: #00f3ff; }
body { margin: 0; background: #0a0a12; font-family: 'Courier New', monospace; color: white; overflow: hidden; text-align: center; }
.top-ui { display: flex; justify-content: space-between; padding: 20px 50px; }
.hp-box { width: 320px; height: 28px; border: 3px solid #fff; background: #000; box-shadow: 0 0 10px #fff; }
.hp-bar { height: 100%; width: 100%; background: var(--neon-green); transition: width 0.2s; }
#timer { font-size: 3rem; text-shadow: 0 0 15px var(--neon-blue); }

#stage { display: flex; justify-content: space-around; align-items: flex-end; height: 350px; position: relative; }
.character { font-size: 9rem; position: relative; z-index: 2; transition: transform 0.1s; }
/* 장풍 이펙트 스타일 */
.hadouken {
    position: absolute; font-size: 3rem; z-index: 1;
    text-shadow: 0 0 20px var(--neon-blue), 0 0 40px blue;
    transition: left 0.05s linear;
}
#input { background: #000; color: var(--neon-green); border: 4px solid var(--neon-green); padding: 15px; font-size: 1.8rem; text-align: center; width: 450px; outline: none; margin-top: 30px; }
#ko { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 8rem; color: var(--neon-red); display: none; font-weight: bold; }
</style>
</head>
<body>

<h1>STREET CODING FIGHTER v8.0</h1>

<div class="top-ui">
    <div>PLAYER<div class="hp-box"><div id="pHP" class="hp-bar"></div></div></div>
    <div id="timer">90</div>
    <div>BUG ENEMY<div class="hp-box"><div id="eHP" class="hp-bar"></div></div></div>
</div>

<div id="stage">
    <div id="player" class="character">🧑‍💻</div>
    <div id="enemy" class="character">👾</div>
    <div id="projectiles"></div>
</div>

<input id="input" placeholder="Type 'h' for HADOUKEN!" autocomplete="off" autofocus>
<div id="ko">K.O.</div>

<script>
// 튜토리얼 3편 기반 발사체 엔진
let projectiles = [];
let canFire = true;
let pHP = 100, eHP = 100, time = 90, isGameOver = false;

const pChar = document.getElementById("player");
const eChar = document.getElementById("enemy");
const projContainer = document.getElementById("projectiles");

// 장풍 발사 로직 (3번 프레임 동기화 모사)
function fireHadouken() {
    if (!canFire || isGameOver) return;
    
    canFire = false;
    pChar.innerText = "👐"; // 발사 포즈
    
    // 튜토리얼처럼 약간의 딜레이 후 장풍 생성
    setTimeout(() => {
        const h = document.createElement("div");
        h.className = "hadouken";
        h.innerText = "🌀";
        h.style.left = "250px";
        h.style.bottom = "120px";
        projContainer.appendChild(h);
        
        let posX = 250;
        const moveInt = setInterval(() => {
            posX += 10;
            h.style.left = posX + "px";
            
            // 충돌 감지 (적 위치 도달 시)
            if (posX > window.innerWidth - 300) {
                clearInterval(moveInt);
                h.remove();
                if (!isGameOver) damageEnemy(15);
            }
        }, 20);
    }, 200);

    // 후딜레이 후 다시 평소 상태로
    setTimeout(() => {
        pChar.innerText = "🧑‍💻";
        canFire = true;
    }, 600);
}

function damageEnemy(amt) {
    eHP = Math.max(0, eHP - amt);
    eChar.style.filter = "brightness(3) hue-rotate(90deg)";
    setTimeout(() => eChar.style.filter = "none", 150);
    updateUI();
}

function updateUI() {
    document.getElementById("pHP").style.width = pHP + "%";
    document.getElementById("eHP").style.width = eHP + "%";
    if (pHP <= 0 || eHP <= 0) {
        isGameOver = true;
        document.getElementById("ko").style.display = "block";
    }
}

document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !isGameOver) {
        const cmd = e.target.value.trim().toLowerCase();
        e.target.value = "";
        
        if (cmd === 'h') fireHadouken();
        else if (cmd === 'a') { pChar.innerText = "👊"; setTimeout(()=>pChar.innerText="🧑‍💻", 200); damageEnemy(5); }
    }
});

setInterval(() => { if (!isGameOver) { time--; document.getElementById("timer").innerText = time; } }, 1000);
</script>
</body>
</html>
