<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Nexus Strike: Truth Lens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#ff007f", "accent": "#00f2ff", "bg-dark": "#0a0a0c" } } } }
    </script>
    <style>
        html, body { height: 100dvh; margin: 0; padding: 0; background: #0a0a0c; overflow: hidden; touch-action: none; font-family: 'Public Sans', sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; image-rendering: pixelated; object-fit:contain; }
        #ui-layer { position: relative; z-index: 50; width: 100%; height: 100dvh; pointer-events: none; }
        .interactive { pointer-events: auto; touch-action: manipulation; }
        .btn:active { transform: scale(0.9); filter: brightness(1.5); }
    </style>
</head>
<body class="bg-bg-dark text-white select-none">

    <div id="vs-screen" class="interactive fixed inset-0 z-[100] bg-bg-dark flex flex-col items-center justify-center min-h-[100dvh]">
        <h1 class="text-5xl font-black italic text-white mb-12 drop-shadow-[0_0_20px_rgba(0,242,255,0.5)]">NEXUS STRIKE</h1>
        <button id="start-btn" class="px-16 py-6 bg-accent text-black font-black text-2xl rounded-xl shadow-[0_0_50px_#00f2ff] uppercase italic">FIGHT START</button>
    </div>

    <div id="ui-layer" class="hidden flex flex-col justify-between p-8">
        <div id="hud" class="w-full flex justify-between pointer-events-none mt-2">
            <div class="w-[40%]">
                <div class="flex justify-between font-black italic text-xs text-accent mb-1"><span>P1: NINJA</span><span id="p1-hp-txt">100%</span></div>
                <div class="h-5 bg-black border-2 border-accent/50 rounded-sm"><div id="p1-hp" class="h-full bg-accent transition-all" style="width: 100%"></div></div>
            </div>
            <div class="bg-black/90 border-x-4 border-accent px-6 py-1"><h2 id="timer" class="text-white text-4xl font-black italic">99</h2></div>
            <div class="w-[40%] text-right">
                <div class="flex justify-between flex-row-reverse font-black italic text-xs text-primary mb-1"><span>CPU: DRAGON</span><span id="p2-hp-txt">100%</span></div>
                <div class="h-5 bg-black border-2 border-primary/50 rounded-sm flex flex-row-reverse"><div id="p2-hp-bar" class="h-full bg-primary transition-all" style="width: 100%"></div></div>
            </div>
        </div>

        <div id="controls" class="absolute bottom-8 inset-x-8 flex justify-between items-end">
            <div class="relative w-36 h-36 interactive">
                <button id="up" class="absolute top-0 left-1/2 -translate-x-1/2 btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white text-xl z-10">▲</button>
                <button id="left" class="absolute left-0 top-1/2 -translate-y-1/2 btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white text-xl z-10">◀</button>
                <button id="right" class="absolute right-0 top-1/2 -translate-y-1/2 btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white text-xl z-10">▶</button>
                <button id="down" class="absolute bottom-0 left-1/2 -translate-x-1/2 btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white text-xl z-10">▼</button>
            </div>
            <div class="flex gap-6 interactive">
                <button id="btn-p" class="btn w-20 h-20 rounded-full border-4 border-accent bg-black/80 text-accent font-black text-3xl shadow-[0_0_20px_rgba(0,242,255,0.4)]">P</button>
                <button id="btn-k" class="btn w-20 h-20 rounded-full border-4 border-primary bg-black/80 text-primary font-black text-3xl shadow-[0_0_20px_rgba(255,0,127,0.4)]">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="512" height="288"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 260; 
        const GRAVITY = 0.65;
        const CHAR_WIDTH = 130; 
        const CHAR_HEIGHT = 180; 

        const heldKeys = new Set();
        let hitstop = 0, active = false;

        const P1_IMG = new Image(); 
        const P2_IMG = new Image(); 
        const BG_IMG = new Image();

        // 🛠️ 해결 1: 캐시 파괴자! 스마트폰이 억지로 옛날 이미지를 기억하는 것을 막습니다.
        const cacheBuster = "?v=" + new Date().getTime();
        P1_IMG.src = "ninja.png" + cacheBuster; 
        P2_IMG.src = "dragon.png" + cacheBuster; 
        BG_IMG.src = "background.png" + cacheBuster; 

        const FRAME_COUNTS = { idle: 10, walk: 10, jump: 10, punch: 10, kick: 10, roll: 10, hit: 4 };
        const ANIMS = { idle: 0, walk: 1, jump: 2, punch: 3, kick: 4, roll: 5, hit: 0 };

        class Fighter {
            constructor(x, id, img, isPlayer) {
                this.x = x; this.y = GROUND_Y;
                this.vx = 0; this.vy = 0;
                this.hp = 100; this.id = id; this.img = img;
                this.state = "idle"; this.frame = 0; this.timer = 0;
                this.facing = isPlayer ? 1 : -1; this.isPlayer = isPlayer;
            }

            takeDamage(amt, attacker) {
                this.hp = Math.max(0, this.hp - amt); this.state = "hit";
                this.vx = attacker.facing * 12; hitstop = 6; 
                document.getElementById(this.isPlayer ? "p1-hp" : "p2-hp-bar").style.width = this.hp + "%";
                setTimeout(() => { if(this.hp > 0) this.state = "idle"; }, 300);
            }

            update(opponent) {
                if (this.isPlayer) {
                    if (!["punch", "kick", "roll", "hit"].includes(this.state)) {
                        const L = heldKeys.has("Left"), R = heldKeys.has("Right"), D = heldKeys.has("Down");
                        if (D && (L || R)) { this.state = "roll"; this.vx = (L ? -7 : 7); }
                        else if (L) { this.vx = -6; this.state = "walk"; }
                        else if (R) { this.vx = 6; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                        if (heldKeys.has("Up") && this.y >= GROUND_Y) { this.vy = -16; this.state = "jump"; }
                    }
                } else {
                    const d = Math.abs(this.x - opponent.x);
                    if (d > 120) { this.vx = this.x < opponent.x ? 2.5 : -2.5; this.state = "walk"; }
                    else { this.vx = 0; if(Math.random() < 0.04 && this.state !== "hit") this.attack(opponent, "punch"); else if (this.state !== "hit") this.state = "idle"; }
                }

                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; if(["jump", "roll"].includes(this.state)) this.state = "idle"; }
                this.x = Math.max(30, Math.min(482, this.x));
                if(this.state !== "roll") this.facing = this.x < opponent.x ? 1 : -1;

                if (Date.now() - this.timer > 70) {
                    this.frame = (this.frame + 1) % FRAME_COUNTS[this.state];
                    this.timer = Date.now();
                    if (["punch", "kick"].includes(this.state) && this.frame === 0) this.state = "idle";
                }
            }

            attack(target, type) {
                if (["punch", "kick", "hit", "roll"].includes(this.state)) return;
                this.state = type; this.frame = 0;
                if (Math.abs(this.x - target.x) < 120) target.takeDamage(10, this);
            }

            draw() {
                ctx.save(); 
                ctx.translate(this.x, this.y); 
                ctx.scale(this.facing, 1);

                if (this.state === "hit") ctx.filter = "brightness(4)";

                if (this.img.complete && this.img.width > 0) {
                    // 🛠️ 해결 2: 오토 스마트 렌더링! 이미지 비율에 따라 자를지 말지 결정합니다.
                    if (this.img.width >= this.img.height * 2) {
                        // 가로가 긴 진짜 스프라이트 시트일 경우 -> 10프레임으로 잘라서 애니메이션!
                        const sw = this.img.width / 10;
                        const sh = this.img.height / 6; // 대략 6줄 가정
                        const sy = ANIMS[this.state] * sh;
                        const sx = this.frame * sw;
                        ctx.drawImage(this.img, sx, sy, sw, sh, -CHAR_WIDTH/2, -CHAR_HEIGHT, CHAR_WIDTH, CHAR_HEIGHT);
                    } else {
                        // UI 캡처본이나 일반 사진을 올렸을 경우 -> 자르지 않고 통째로 출력! (퍼펫 모드)
                        let rot = 0; let dx = -CHAR_WIDTH/2; let dy = -CHAR_HEIGHT;
                        if(this.state === "walk") { dy -= Math.abs(Math.sin(Date.now()/80))*10; rot = Math.sin(Date.now()/120)*0.1; }
                        else if(this.state === "punch") { dx += 20; rot = 0.2; }
                        else if(this.state === "kick") { dx += 15; dy -= 10; rot = -0.15; }
                        
                        ctx.rotate(rot);
                        
                        // 비율 유지하며 그리기
                        const ratio = this.img.width / this.img.height;
                        const w = CHAR_HEIGHT * ratio;
                        ctx.drawImage(this.img, -w/2, -CHAR_HEIGHT, w, CHAR_HEIGHT);
                    }
                } else {
                    // 파일이 진짜 없을 때만 나오는 에러 텍스트
                    ctx.fillStyle = this.isPlayer ? "#00f2ff" : "#ff007f";
                    ctx.font = "bold 20px sans-serif";
                    ctx.textAlign = "center";
                    ctx.fillText("NO FILE", 0, -100);
                }
                ctx.restore();
            }
        }

        let p1, p2;
        function loop() {
            if (hitstop > 0) { hitstop--; requestAnimationFrame(loop); return; }
            ctx.fillStyle = "#0a0a0c"; ctx.fillRect(0, 0, 512, 288); 
            if (BG_IMG.complete && BG_IMG.width > 0) { ctx.drawImage(BG_IMG, 0, 0, 512, 288); }
            p1.update(p2); p2.update(p1);
            p1.draw(); p2.draw();
            if (active) requestAnimationFrame(loop);
        }

        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            const press = (e) => { e.preventDefault(); heldKeys.add(key); };
            const release = (e) => { e.preventDefault(); heldKeys.delete(key); };
            el.addEventListener("touchstart", press, { passive: false });
            el.addEventListener("touchend", release, { passive: false });
            el.addEventListener("touchcancel", release, { passive: false });
            el.addEventListener("mousedown", press);
            el.addEventListener("mouseup", release);
            el.addEventListener("mouseleave", release);
        };
        const bindAction = (id, action) => {
            const el = document.getElementById(id);
            const trigger = (e) => { e.preventDefault(); action(); };
            el.addEventListener("touchstart", trigger, { passive: false });
            el.addEventListener("mousedown", trigger);
        };

        document.getElementById("start-btn").onclick = () => {
            document.getElementById("vs-screen").classList.add("opacity-0");
            setTimeout(() => {
                document.getElementById("vs-screen").remove();
                document.getElementById("ui-layer").classList.remove("hidden");
                p1 = new Fighter(120, "NINJA", P1_IMG, true); 
                p2 = new Fighter(390, "DRAGON", P2_IMG, false);
                
                bindBtn("left", "Left"); bindBtn("right", "Right"); 
                bindBtn("up", "Up"); bindBtn("down", "Down");
                bindAction("btn-p", () => p1.attack(p2, "punch"));
                bindAction("btn-k", () => p1.attack(p2, "kick"));
                
                active = true; loop();
            }, 600);
        };
    </script>
</body>
</html>
