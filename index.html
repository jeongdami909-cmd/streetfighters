<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Nexus Strike: Interactive Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#258cf4", "neon-blue": "#00f3ff", "neon-amber": "#ffaa00", "background-dark": "#101622" } } } }
    </script>
    <style>
        body { background: #101622; overflow: hidden; touch-action: none; font-family: 'Public Sans', sans-serif; }
        /* 🛠️ 해결방법 1: 캔버스 이벤트 개방 */
        canvas { 
            position: absolute; top: 0; left: 0;
            image-rendering: pixelated; object-fit: contain; 
            width: 100vw; height: 100vh; z-index: 0; 
            pointer-events: none; 
        }
        .cyber-grid { background-image: linear-gradient(rgba(13, 89, 242, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(13, 89, 242, 0.05) 1px, transparent 1px); background-size: 40px 40px; }
        /* 🛠️ 해결방법 2: UI 레이어 Z-index 강화 */
        #ui-layer { position: relative; z-index: 50; width: 100%; height: 100vh; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .btn:active { background: #00f3ff !important; color: #000 !important; transform: scale(0.9); }
    </style>
</head>
<body class="bg-background-dark text-white select-none">

    <div class="absolute inset-0 cyber-grid opacity-30"></div>

    <div id="vs-intro" class="interactive fixed inset-0 z-[100] bg-background-dark flex flex-col items-center justify-center transition-opacity duration-500">
        <h1 class="text-6xl font-black italic text-neon-blue mb-8">ZERO <span class="text-white text-3xl">VS</span> KAEL</h1>
        <button id="start-btn" class="px-12 py-5 bg-primary text-white font-black text-xl rounded-lg shadow-2xl active:scale-95 transition">ENGAGE NEURAL LINK</button>
    </div>

    <div id="ui-layer">
        <div id="hud" class="hidden absolute top-0 inset-x-0 p-6 flex justify-between items-start">
            <div class="w-1/3"><div class="h-4 bg-black/40 border border-white/20"><div id="p1-hp" class="h-full bg-neon-blue transition-all" style="width: 100%"></div></div></div>
            <div class="bg-black/60 border-x-4 border-primary px-4 py-1 text-3xl font-black italic text-primary">99</div>
            <div class="w-1/3"><div class="h-4 bg-black/40 border border-white/20 flex flex-row-reverse"><div id="p2-hp" class="h-full bg-neon-amber transition-all" style="width: 100%"></div></div></div>
        </div>

        <div id="controls" class="hidden absolute bottom-10 inset-x-0 px-8 flex justify-between items-end">
            <div class="grid grid-cols-3 gap-2 interactive">
                <div class="size-14"></div><button id="ctrl-up" class="btn size-14 bg-white/10 rounded-lg border border-white/20">▲</button><div></div>
                <button id="ctrl-left" class="btn size-14 bg-white/10 rounded-lg border border-white/20">◀</button>
                <button id="ctrl-down" class="btn size-14 bg-white/10 rounded-lg border border-white/20">▼</button>
                <button id="ctrl-right" class="btn size-14 bg-white/10 rounded-lg border border-white/20">▶</button>
            </div>
            <div class="grid grid-cols-2 gap-4 interactive">
                <button id="btn-p" class="btn size-20 rounded-full border-2 border-neon-blue bg-black/40 text-neon-blue font-black">P</button>
                <button id="btn-k" class="btn size-20 rounded-full border-2 border-neon-blue bg-black/40 text-neon-blue font-black">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="384" height="224"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 195;
        const GRAVITY = 0.6;
        const heldKeys = new Set();

        class Fighter {
            constructor(x, color, isPlayer) {
                this.x = x; this.y = GROUND_Y;
                this.vx = 0; this.vy = 0;
                this.hp = 100; this.color = color;
                this.state = "idle"; // idle, walk, jump, punch, kick, hit
                this.frame = 0; this.timer = 0;
                this.facing = isPlayer ? 1 : -1;
                this.isPlayer = isPlayer;
            }

            // AI 추격 로직 (v24.0 기반 고도화)
            updateAI(target) {
                if (this.state === "hit" || this.state === "punch") return;
                const d = Math.abs(this.x - target.x);
                if (d > 60) { this.vx = this.x < target.x ? 1.5 : -1.5; this.state = "walk"; }
                else { this.vx = 0; if(Math.random() < 0.04) this.attack(target); else this.state = "idle"; }
            }

            attack(target) {
                this.state = "punch"; this.frame = 0;
                if (Math.abs(this.x - target.x) < 55 && target.state !== "roll") {
                    target.hp = Math.max(0, target.hp - 10);
                    target.state = "hit";
                    document.getElementById(target.isPlayer ? "p1-hp" : "p2-hp").style.width = target.hp + "%";
                }
            }

            update(t, target) {
                if (this.isPlayer) {
                    if (!["punch", "hit"].includes(this.state)) {
                        if (heldKeys.has("Left")) { this.vx = -3.5; this.state = "walk"; }
                        else if (heldKeys.has("Right")) { this.vx = 3.5; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                        if (heldKeys.has("Up") && this.y >= GROUND_Y) this.vy = -12;
                    }
                } else this.updateAI(target);

                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; }
                this.x = Math.max(20, Math.min(364, this.x));
                this.facing = this.x < target.x ? 1 : -1;

                if (t - this.timer > 100) {
                    this.frame = (this.frame + 1) % 2; this.timer = t;
                    if (["punch", "hit"].includes(this.state) && this.frame === 0) this.state = "idle";
                }
            }

            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.facing, 1);
                ctx.fillStyle = this.state === "hit" ? "white" : this.color;
                ctx.fillRect(-15, -50, 30, 50); // 캐릭터 몸체
                
                // 공격 모션 시각화
                if (this.state === "punch") { ctx.fillStyle = "white"; ctx.fillRect(10, -40, 30, 10); }
                ctx.restore();
            }
        }

        let p1, p2, active = false;
        function loop(t) {
            if (!active) return;
            ctx.fillStyle = "#101622"; ctx.fillRect(0, 0, 384, 224);
            p1.update(t, p2); p2.update(t, p1);
            p1.draw(); p2.draw();
            requestAnimationFrame(loop);
        }

        // 🛠️ 버튼 조작 바인딩 (이벤트 전파 보장)
        const setup = (id, key) => {
            const el = document.getElementById(id);
            const down = (e) => { e.preventDefault(); heldKeys.add(key); };
            const up = (e) => { e.preventDefault(); heldKeys.delete(key); };
            el.addEventListener('pointerdown', down);
            el.addEventListener('pointerup', up);
            el.addEventListener('pointerleave', up);
        };

        document.getElementById("start-btn").onclick = () => {
            document.getElementById("vs-intro").classList.add("opacity-0");
            setTimeout(() => {
                document.getElementById("vs-intro").remove();
                document.getElementById("hud").classList.remove("hidden");
                document.getElementById("controls").classList.remove("hidden");
                p1 = new Fighter(80, "#00f3ff", true); p2 = new Fighter(300, "#ffaa00", false);
                setup("ctrl-left", "Left"); setup("ctrl-right", "Right"); setup("ctrl-up", "Up");
                document.getElementById("btn-p").onpointerdown = () => p1.attack(p2);
                document.getElementById("btn-k").onpointerdown = () => p1.attack(p2);
                active = true; requestAnimationFrame(loop);
            }, 600);
        };
    </script>
</body>
</html>
