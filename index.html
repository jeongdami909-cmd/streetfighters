<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>STREET CODING FIGHTER v11.0 - HIT PHYSICS</title>
<style>
:root { --neon-green: #39ff14; --neon-red: #ff073a; --neon-blue: #00f3ff; }
body { margin: 0; background: #0a0a12; font-family: 'Courier New', monospace; color: white; overflow: hidden; text-align: center; }
.top-ui { display: flex; justify-content: space-between; padding: 20px 50px; }
.hp-box { width: 320px; height: 30px; border: 3px solid #fff; background: #000; box-shadow: 0 0 15px #fff; }
.hp-bar { height: 100%; width: 100%; background: var(--neon-green); transition: width 0.2s; }

#stage { display: flex; justify-content: space-around; align-items: flex-end; height: 350px; position: relative; }
.character { font-size: 9rem; position: relative; z-index: 2; transition: all 0.1s; }

/* 튜토리얼 6편: 피격 및 밀림 연출 */
.character.hit-face { transform: rotate(-20deg) translateX(-30px); filter: brightness(2); }
.character.hit-body { transform: scale(0.9) translateX(-40px); filter: brightness(1.5); }
.character.idle { transform: none; filter: none; }

.hadouken { position: absolute; font-size: 3.5rem; z-index: 1; text-shadow: 0 0 20px var(--neon-blue); }
#input { background: #000; color: var(--neon-green); border: 4px solid var(--neon-green); padding: 15px; font-size: 1.8rem; text-align: center; width: 450px; outline: none; margin-top: 30px; }
#ko { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 9rem; color: var(--neon-red); display: none; font-weight: bold; }
</style>
</head>
<body>

<h1>STREET CODING FIGHTER v11.0</h1>

<div class="top-ui">
    <div>PLAYER (KEN)<div class="hp-box"><div id="pHP" class="hp-bar"></div></div></div>
    <div id="timer">90</div>
    <div>RIVAL (CHUN-LI)<div class="hp-box"><div id="eHP" class="hp-bar"></div></div></div>
</div>

<div id="stage">
    <div id="player" class="character">🧑‍💻</div>
    <div id="enemy" class="character">👾</div>
    <div id="projectiles"></div>
</div>

<input id="input" placeholder="COMMAND: h (Hadouken)" autocomplete="off" autofocus>
<div id="ko">K.O.</div>

<script>
let pHP = 100, eHP = 100, time = 90, isGameOver = false;
const eChar = document.getElementById("enemy");

// 튜토리얼 6편: 피격 판정 및 리액션 시스템
function onHit(isFace) {
    if (isGameOver) return;
    
    // 피격 부위에 따른 상태 변화
    const state = isFace ? "hit-face" : "hit-body";
    eChar.className = "character " + state;
    
    // 데미지 및 넉백 물리 적용
    eHP = Math.max(0, eHP - (isFace ? 15 : 10));
    document.getElementById("eHP").style.width = eHP + "%";
    
    // 일정 시간 후 idle 복귀
    setTimeout(() => {
        if (!isGameOver) eChar.className = "character idle";
    }, 300);

    if (eHP <= 0) { isGameOver = true; document.getElementById("ko").style.display = "block"; }
}

function fireHadouken() {
    if (isGameOver) return;
    const h = document.createElement("div");
    h.className = "hadouken";
    h.innerText = "🌀";
    h.style.left = "250px";
    h.style.bottom = "120px";
    document.getElementById("projectiles").appendChild(h);
    
    let hX = 250;
    const moveInt = setInterval(() => {
        hX += 15;
        h.style.left = hX + "px";
        
        // 튜토리얼 6편의 부위 판정 로직 모사 (랜덤하게 상/중단 판정)
        if (hX > window.innerWidth - 300) {
            clearInterval(moveInt);
            h.remove();
            onHit(Math.random() > 0.5); // 50% 확률로 얼굴 히트
        }
        if (hX > window.innerWidth) { clearInterval(moveInt); h.remove(); }
    }, 20);
}

document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !isGameOver) {
        if (e.target.value.trim().toLowerCase() === 'h') fireHadouken();
        e.target.value = "";
    }
});
</script>
</body>
</html>
