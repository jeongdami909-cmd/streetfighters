<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Nexus Strike: Neon Fury PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#00f2ff", "accent-pink": "#ff00ea", "background-dark": "#050505" } } } }
    </script>
    <style>
        /* 🛠️ 해결방법: 100dvh 및 모바일 최적화 */
        html, body { height: 100dvh; margin: 0; padding: 0; background: #050505; overflow: hidden; touch-action: manipulation; font-family: 'Public Sans', sans-serif; }
        canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; image-rendering: pixelated; object-fit:contain; }
        
        #ui-layer { position: relative; z-index: 50; width: 100%; height: 100dvh; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .glitch-text { text-shadow: 2px 0 #ff00ea, -2px 0 #00f2ff; }
        .btn:active { background: #00f2ff !important; color: #000 !important; transform: scale(0.9); }
    </style>
</head>
<body class="bg-background-dark text-white select-none">

    <div id="vs-screen" class="interactive fixed inset-0 z-[100] bg-background-dark flex flex-col items-center justify-center min-h-[100dvh]">
        <div class="flex gap-8 md:gap-20 items-center">
            <div class="text-center">
                <div class="size-44 md:size-64 border-2 border-primary rounded-xl bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBP8nw5vNjt7bi6IsVhAmQniJ3hzTRh3hRKqn1vUTckYCzwA7Bo1jQ55Giilsh0tS47xgwfHrbKaKlDbZpsgm0vOzHH1GCvcL-cCwULJv0bA5y-xBZUve_IFaLw2ZddvpfA19FTNCj1HCfCk9ozKrLZ2P3amibHTyQcVX819EBTdtiuSZIiIkr7oQrRAXD1hxP-QrurS7OJyRAP1Pl6wAebQvgu7E12D9tu6tM1rdD_3S1wFasgHoMBVGUOTp95w1QccAqGkCD1hQ8');"></div>
                <h1 class="text-4xl font-black italic mt-4 text-primary italic">ZERO</h1>
            </div>
            <div class="text-7xl font-black italic text-white glitch-text italic">VS</div>
            <div class="text-center">
                <div class="size-44 md:size-64 border-2 border-red-500 rounded-xl bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC4BNMBOQy8Uz62HXWOE3VuQawfZvaGrm3y38t-b3ZhWv9k2d97OSghZAGghB2xOvonOAtV1dsxR2d-Oyz1iptqCFgA9HYPyXci4_suvokH5zZ47r0ldHfU_dchB_jtWym0nmTfw1In1To4JpUsuFj_1A7MGusZau1Xhen3ZH5eCdOFDT-FMm5K4__BHj1-Sqc_z8h6fwB6JbQmWe4Wix_mDAAk7BQZt8gmMXbndb8RX1OLz8-XqftWoYFecdyjqh8-ULRDTibBROc');"></div>
                <h1 class="text-4xl font-black italic mt-4 text-red-500 italic">KAEL</h1>
            </div>
        </div>
        <button id="start-btn" class="mt-12 px-12 py-5 bg-primary text-black font-black text-xl rounded shadow-[0_0_40px_rgba(0,242,255,0.6)]">ENGAGE NEURAL LINK</button>
    </div>

    <div id="victory-screen" class="hidden fixed inset-0 z-[110] bg-background-dark/95 flex flex-col items-center justify-center p-8">
        <h1 class="text-primary text-8xl font-black italic glitch-text mb-6">VICTORY</h1>
        <div class="max-w-md w-full bg-slate-900 border border-primary/20 p-6 rounded-xl text-center">
            <p class="text-slate-400 font-bold mb-2">RANK UP DETECTED</p>
            <h2 class="text-3xl font-black italic text-white mb-6">SILVER IV</h2>
            <button onclick="location.reload()" class="w-full py-4 bg-primary text-black font-black italic rounded-lg">REMATCH // READY</button>
        </div>
    </div>

    <div id="ui-layer">
        <div id="hud" class="hidden absolute top-6 inset-x-0 px-6 flex justify-between items-start">
            <div class="w-1/3">
                <div class="flex justify-between font-black italic text-sm mb-1"><span>ZERO</span><span id="p1-hp-txt">100%</span></div>
                <div class="h-4 bg-black/40 border border-white/10"><div id="p1-hp-bar" class="h-full bg-primary" style="width: 100%"></div></div>
            </div>
            <div class="bg-black/80 border-x-2 border-primary px-6 py-1"><h2 id="timer" class="text-primary text-3xl font-black italic">99</h2></div>
            <div class="w-1/3 text-right">
                <div class="flex justify-between flex-row-reverse font-black italic text-sm mb-1"><span>KAEL</span><span id="p2-hp-txt">100%</span></div>
                <div class="h-4 bg-black/40 border border-white/10 flex flex-row-reverse"><div id="p2-hp-bar" class="h-full bg-red-500" style="width: 100%"></div></div>
            </div>
        </div>

        <div id="controls" class="hidden absolute bottom-10 inset-x-0 px-8 flex justify-between items-end">
            <div class="grid grid-cols-3 gap-2 interactive">
                <div></div><button id="up" class="btn size-14 bg-white/10 rounded-lg border border-white/20">▲</button><div></div>
                <button id="left" class="btn size-14 bg-white/10 rounded-lg border border-white/20">◀</button>
                <button id="down" class="btn size-14 bg-white/10 rounded-lg border border-white/20">▼</button>
                <button id="right" class="btn size-14 bg-white/10 rounded-lg border border-white/20">▶</button>
            </div>
            <div class="flex gap-4 interactive">
                <button id="btn-p" class="btn size-20 rounded-full border-4 border-primary bg-black/40 text-primary font-black italic text-2xl">P</button>
                <button id="btn-k" class="btn size-20 rounded-full border-4 border-accent-pink bg-black/60 text-accent-pink font-black italic text-2xl">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="384" height="224"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 195;
        const GRAVITY = 0.6;
        const heldKeys = new Set();
        let hitstop = 0; let active = false;

        // 🛠️ 이미지 깨짐 대비 애니메이션 리소스
        const SPRITES = { bg: new Image(), p1: [], p2: new Image() };
        SPRITES.bg.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBqxvGMkpkIc9bUxOOhYj3MALyCCXoUTlWmjgZa_PoaWkrdHXTgZoFK9z3GFLPnQV0gNavZwMzBQu_Yjg6kBDfNkWBP1KCO3PVzqIrVtg7zkxJS2CPQCrc5sMgkebFVy-XDUGDNckTRUQqas54fGjA24j30B13LJhPQ9T3jHYlyuPjq9OIcT41BNPOkWsSFTaOULhPpaVwVeiEHk74KcyZDbB1NIxdoTNBCsJ7xrz77dqbNhBc_lKC4cOWWHsx5OKD53vApgFQU79A";

        class Fighter {
            constructor(x, id, isPlayer) {
                this.x = x; this.y = GROUND_Y; this.vx = 0; this.vy = 0;
                this.hp = 100; this.id = id;
                this.state = "idle"; // idle, walk, jump, punch, kick, hit
                this.frame = 0; this.timer = 0;
                this.facing = isPlayer ? 1 : -1; this.isPlayer = isPlayer;
                this.isHit = false;
            }

            takeDamage(amt, attacker) {
                this.hp = Math.max(0, this.hp - amt); this.state = "hit";
                this.vx = attacker.facing * 7; hitstop = 5;
                document.getElementById(this.isPlayer ? "p1-hp-bar" : "p2-hp-bar").style.width = this.hp + "%";
                document.getElementById(this.isPlayer ? "p1-hp-txt" : "p2-hp-txt").innerText = this.hp + "%";
                if(this.hp <= 0) endGame();
                setTimeout(() => { if(this.hp > 0) this.state = "idle"; }, 300);
            }

            update(opponent) {
                if (this.hp <= 0) return;
                
                if (this.isPlayer) {
                    if (!["punch", "kick", "hit"].includes(this.state)) {
                        const L = heldKeys.has("Left"); const R = heldKeys.has("Right");
                        if (L) { this.vx = -4; this.state = "walk"; }
                        else if (R) { this.vx = 4; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                        if (heldKeys.has("Up") && this.y >= GROUND_Y) this.vy = -12;
                    }
                } else {
                    // AI 로직
                    const d = Math.abs(this.x - opponent.x);
                    if (d > 60) { this.vx = this.x < opponent.x ? 2 : -2; this.state = "walk"; }
                    else { this.vx = 0; if(Math.random() < 0.05) this.attack(opponent, "punch"); else this.state = "idle"; }
                }

                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; }
                this.x = Math.max(20, Math.min(364, this.x));
                this.facing = this.x < opponent.x ? 1 : -1;

                if (Date.now() - this.timer > 100) {
                    this.frame = (this.frame + 1) % 2; this.timer = Date.now();
                    if (["punch", "kick"].includes(this.state) && this.frame === 0) this.state = "idle";
                }
            }

            attack(target, type) {
                if (["punch", "kick"].includes(this.state)) return;
                this.state = type; this.frame = 0;
                new Audio('https://actions.google.com/sounds/v1/impacts/crash_metal.ogg').play().catch(()=>{});
                if (Math.abs(this.x - target.x) < 55) target.takeDamage(10, this);
            }

            // 🛠️ 팔다리 애니메이션 드로잉 로직 (이미지 깨짐 방지)
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.facing, 1);
                
                const bodyColor = this.isPlayer ? "#00f2ff" : "#ffaa00";
                ctx.fillStyle = this.state === "hit" ? "white" : bodyColor;
                
                // 몸체
                ctx.fillRect(-12, -50, 24, 50);
                
                // 팔다리 움직임 시뮬레이션
                ctx.strokeStyle = "white"; ctx.lineWidth = 4;
                
                if (this.state === "walk") {
                    // 걷기: 다리 교차
                    ctx.beginPath();
                    ctx.moveTo(0, -10); ctx.lineTo(this.frame === 0 ? 15 : -15, 0);
                    ctx.stroke();
                } else if (this.state === "punch") {
                    // 주먹: 팔 뻗기
                    ctx.fillRect(10, -40, 35, 8);
                } else if (this.state === "kick") {
                    // 발차기: 다리 뻗기
                    ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(40, -10); ctx.stroke();
                } else {
                    // 아이들: 기본 자세
                    ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(8, 0); ctx.moveTo(0, -10); ctx.lineTo(-8, 0); ctx.stroke();
                }
                
                ctx.restore();
            }
        }

        let p1, p2;
        function endGame() { active = false; setTimeout(() => document.getElementById("victory-screen").classList.remove("hidden"), 1000); }
        
        function loop() {
            if (hitstop > 0) { hitstop--; requestAnimationFrame(loop); return; }
            ctx.drawImage(SPRITES.bg, 0, 0, 384, 224);
            p1.update(p2); p2.update(p1);
            p1.draw(); p2.draw();
            if (active) requestAnimationFrame(loop);
        }

        const bind = (id, key) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); heldKeys.add(key); };
            el.onpointerup = (e) => { e.preventDefault(); heldKeys.delete(key); };
        };

        document.getElementById("start-btn").onclick = () => {
            document.getElementById("vs-screen").classList.add("hidden");
            document.getElementById("hud").classList.remove("hidden");
            document.getElementById("controls").classList.remove("hidden");
            p1 = new Fighter(80, "ZERO", true); p2 = new Fighter(300, "KAEL", false);
            bind("left", "Left"); bind("right", "Right"); bind("up", "Up");
            document.getElementById("btn-p").onpointerdown = () => p1.attack(p2, "punch");
            document.getElementById("btn-k").onpointerdown = () => p1.attack(p2, "kick");
            active = true; loop();
        };
    </script>
</body>
</html>
