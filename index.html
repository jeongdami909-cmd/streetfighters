<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STREET CODING FIGHTER v19.0</title>
<style>
    canvas { image-rendering: pixelated; object-fit: contain; width: 100%; height: 100%; background: #000; }
    body { margin: 0; background: #000; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: #ffcc33; font-family: 'Courier New', monospace; }
    #start-btn { padding: 20px 80px; font-size: 2.5rem; background: #ff4444; color: white; border: 5px solid #fff; border-radius: 50px; cursor: pointer; box-shadow: 0 0 40px #ff4444; font-weight: bold; }
    #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 500; pointer-events: none; }
    .btn { width: 90px; height: 90px; background: rgba(255,255,255,0.2); border: 4px solid #fff; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; font-size: 1.2rem; user-select: none; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 3rem; text-shadow: 0 0 30px red; margin: 0;">STREET CODING</h1>
    <p style="letter-spacing: 3px;">Part 6: Advanced Input & Shadows</p>
    <button id="start-btn">FIGHT!</button>
</div>

<canvas id="game" width="384" height="224"></canvas>

<div id="controls">
    <div class="btn" id="left">LEFT</div>
    <div class="btn" id="atk">ATK</div>
    <div class="btn" id="right">RIGHT</div>
    <div class="btn" id="jump">JUMP</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const GROUND_Y = 190;
const GRAVITY = 0.6;

// 🛠️ 튜토리얼 6편: 입력 핸들러 (지속 입력 추적)
const heldKeys = new Set();
window.addEventListener("keydown", (e) => heldKeys.add(e.code));
window.addEventListener("keyup", (e) => heldKeys.delete(e.code));

const ANIMS = {
    p1: { idle: ["🧑‍💻", "👨‍💻"], walk: ["🏃", "🚶"], jump: ["✈️"], attack: ["👊", "🤜"], hit: ["🤕"] },
    p2: { idle: ["👾", "💀"], walk: ["👣", "💀"], jump: ["🛸"], attack: ["💥", "🔥"], hit: ["😵"] }
};

class Fighter {
    constructor(x, id, config) {
        this.x = x; this.y = GROUND_Y;
        this.vx = 0; this.vy = 0;
        this.hp = 100;
        this.id = id;
        this.config = config;
        this.currentState = "idle";
        this.frameIndex = 0;
        this.animTimer = 0;
        this.facing = id === "P1" ? 1 : -1;
    }

    // 🛠️ 튜토리얼 6편: 상태 머신 고도화
    update(time, opponent) {
        // 입력 상태에 따른 상태 전환
        if (this.currentState !== "jump" && this.currentState !== "hit" && this.currentState !== "attack") {
            if (heldKeys.has(this.id === "P1" ? "ArrowLeft" : "KeyA")) {
                this.currentState = "walk";
                this.vx = -3;
            } else if (heldKeys.has(this.id === "P1" ? "ArrowRight" : "KeyD")) {
                this.currentState = "walk";
                this.vx = 3;
            } else {
                this.currentState = "idle";
                this.vx = 0;
            }

            if (heldKeys.has(this.id === "P1" ? "ArrowUp" : "KeyW")) {
                this.currentState = "jump";
                this.vy = -12;
            }
        }

        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;

        if (this.y >= GROUND_Y) {
            this.y = GROUND_Y;
            this.vy = 0;
            if (this.currentState === "jump") this.currentState = "idle";
        }

        this.x = Math.max(20, Math.min(364, this.x));

        // 애니메이션 타이머
        if (time - this.animTimer > 100) {
            this.frameIndex = (this.frameIndex + 1) % ANIMS[this.config][this.currentState].length;
            this.animTimer = time;
            if (this.currentState === "attack" && this.frameIndex === 0) this.currentState = "idle";
        }
    }

    draw() {
        ctx.save();
        // 🛠️ 튜토리얼 6편: 캐릭터 그림자 (점프 시 거리감 구현)
        const jumpDist = GROUND_Y - this.y;
        const shadowScale = Math.max(0.2, 1 - (jumpDist / 100));
        ctx.globalAlpha = 0.4 * shadowScale;
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.ellipse(this.x, GROUND_Y, 20 * shadowScale, 5 * shadowScale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;

        ctx.textAlign = "center"; ctx.textBaseline = "bottom";
        ctx.font = "60px Arial";
        if (this.currentState === "hit") ctx.filter = "brightness(2)";
        ctx.fillText(ANIMS[this.config][this.currentState][this.frameIndex], this.x, this.y);
        
        // HP 바
        ctx.filter = "none";
        ctx.fillStyle = "#444"; ctx.fillRect(this.x - 20, this.y - 75, 40, 4);
        ctx.fillStyle = this.hp > 30 ? "#39ff14" : "#ff4444";
        ctx.fillRect(this.x - 20, this.y - 75, (this.hp/100)*40, 4);
        ctx.restore();
    }
}

const p1 = new Fighter(100, "P1", "p1");
const p2 = new Fighter(280, "P2", "p2");

function loop(timestamp) {
    const sky = ctx.createLinearGradient(0, 0, 0, 224);
    sky.addColorStop(0, "#1a1a2e"); sky.addColorStop(0.5, "#000"); sky.addColorStop(1, "#6a5acd");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, 384, 224);

    p1.update(timestamp, p2); p2.update(timestamp, p1);
    p1.draw(); p2.draw();
    requestAnimationFrame(loop);
}

// 🛠️ 가상 버튼을 전문 입력 핸들러(Set)와 연결
function bind(id, code) {
    const el = document.getElementById(id);
    const down = (e) => { e.preventDefault(); heldKeys.add(code); };
    const up = (e) => { e.preventDefault(); heldKeys.delete(code); };
    el.addEventListener('touchstart', down, {passive: false});
    el.addEventListener('touchend', up, {passive: false});
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
}

bind("left", "ArrowLeft");
bind("right", "ArrowRight");
bind("jump", "ArrowUp");
document.getElementById("atk").onpointerdown = () => { if(p1.currentState !== "attack") { p1.currentState = "attack"; p1.frameIndex = 0; } };

document.getElementById("start-btn").onclick = () => { 
    document.getElementById("overlay").remove(); 
    requestAnimationFrame(loop); 
};
</script>
</body>
</html>
