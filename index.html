<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Nexus Strike: Master Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#ec5b13", "accent": "#00f2ff", "bg-dark": "#0a0a0c" } } } }
    </script>
    <style>
        /* 🛠️ 해결: 100dvh 및 터치 최적화 */
        html, body { height: 100dvh; margin: 0; padding: 0; background: #0a0a0c; overflow: hidden; touch-action: manipulation; font-family: 'Public Sans', sans-serif; }
        canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; image-rendering: pixelated; object-fit:contain; }
        #ui-layer { position: relative; z-index: 50; width: 100%; height: 100dvh; pointer-events: auto; }
        .btn:active { background: #00f2ff !important; color: #000 !important; transform: scale(0.9); box-shadow: 0 0 20px #00f2ff; }
    </style>
</head>
<body class="bg-bg-dark text-white select-none">

    <div id="loading-gate" class="fixed inset-0 z-[200] bg-bg-dark flex flex-col items-center justify-center">
        <div class="w-48 h-1 bg-white/10 rounded-full mb-4 overflow-hidden"><div id="load-bar" class="h-full bg-accent transition-all duration-300" style="width: 0%"></div></div>
        <p class="text-accent text-sm font-black italic animate-pulse">Establishing Combat Link...</p>
    </div>

    <div id="vs-screen" class="hidden interactive fixed inset-0 z-[100] bg-bg-dark flex flex-col items-center justify-center min-h-[100dvh]">
        <h1 class="text-5xl font-black italic text-accent mb-12">NEXUS STRIKE</h1>
        <div class="flex gap-10 items-center mb-12">
            <div class="text-center">
                <div class="size-40 border-2 border-accent rounded-xl bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD_8mhVTPsrVNdoaznLKgKKvgYwxntgmix1TrjDFGV6V2JfjXq1_gp_xpNJQxuF37ODlgoD-2wELp5CsI3I2xKWJo_KtHDFfWWqz42LmZeTvSerokWuLhP0HRdvnrCwx-gsvzQkXMEYFXOG9FlWizjRSEuzaIq1-s1sHu5vO2V1lARYrKrQN9yyNPLbTP4vgbVy6btjiu2DH9WKyzIoK7oPiXo0JD6IdyXicxeeUN8Ifwibans2QTTxgQbPwv0wOUdoxvLPSLszzPM');"></div>
                <h2 class="text-2xl font-black mt-4 text-accent">NINJA</h2>
            </div>
            <div class="text-4xl font-black italic text-primary">VS</div>
            <div class="text-center">
                <div class="size-40 border-2 border-primary rounded-xl bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC6iVUbj_xI23hlisPPukyjOcddT15wi0c5spFmhalGUzvji9FpGecbJpi854c4LCBdmKYBwylbSYrK5VomYncIdWvEqoAhAzsQQYRM7cldEnD03hkhC4czYKZSiShSWfZ_5mQb8R4emLrPqfMNcGIQ4bvPOVWzcWSsHzrCS96OW7RyB8cZ4JH3TUDCShu8wUk0WdKqb0X4080_7HYnxeb1v5_5yilBvPXzQtDE3Dyd8NeMEiuDW8ltUeTLLiryB7z_QBefSzZh3qk');"></div>
                <h2 class="text-2xl font-black mt-4 text-primary">RYU</h2>
            </div>
        </div>
        <button id="start-btn" class="px-16 py-6 bg-accent text-black font-black text-2xl rounded shadow-[0_0_40px_#00f2ff] uppercase italic">Neural Connect</button>
    </div>

    <div id="ui-layer" class="hidden">
        <div id="hud" class="absolute top-6 inset-x-8 flex justify-between pointer-events-none">
            <div class="w-[40%]">
                <div class="flex justify-between font-black italic text-[10px] text-accent mb-1"><span>P1: NINJA</span><span id="p1-hp-txt">100%</span></div>
                <div class="h-4 bg-black border border-accent/30"><div id="p1-hp" class="h-full bg-accent" style="width: 100%"></div></div>
            </div>
            <div class="bg-black/80 border-x-4 border-accent px-6 py-1"><h2 id="timer" class="text-accent text-4xl font-black italic">99</h2></div>
            <div class="w-[40%] text-right">
                <div class="flex justify-between flex-row-reverse font-black italic text-[10px] text-primary mb-1"><span>CPU: RYU</span><span id="p2-hp-txt">100%</span></div>
                <div class="h-4 bg-black border border-primary/30 flex flex-row-reverse"><div id="p2-hp-bar" class="h-full bg-primary" style="width: 100%"></div></div>
            </div>
        </div>

        <div id="controls" class="absolute bottom-14 inset-x-8 flex justify-between items-end">
            <div class="grid grid-cols-3 gap-3">
                <div></div><button id="up" class="btn size-16 bg-white/5 border border-white/20 rounded-xl text-white">▲</button><div></div>
                <button id="left" class="btn size-16 bg-white/5 border border-white/20 rounded-xl text-white">◀</button>
                <button id="down" class="btn size-16 bg-white/5 border border-white/20 rounded-xl text-white">▼</button>
                <button id="right" class="btn size-16 bg-white/5 border border-white/20 rounded-xl text-white">▶</button>
            </div>
            <div class="flex gap-6">
                <button id="btn-p" class="btn size-20 rounded-full border-4 border-accent bg-black/60 text-accent font-black italic text-2xl">P</button>
                <button id="btn-k" class="btn size-20 rounded-full border-4 border-primary bg-black/60 text-primary font-black italic text-2xl">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="384" height="224"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 195;
        const GRAVITY = 0.6;
        const DRAW_SIZE = 100; // 🛠️ 해결: 캐릭터 크기 대폭 키움
        const heldKeys = new Set();
        let hitstop = 0, active = false;

        const sounds = { hit: new Audio('https://actions.google.com/sounds/v1/impacts/crash_metal.ogg'), bgm: new Audio('https://actions.google.com/sounds/v1/ambient/dark_scifi_drone.ogg') };
        sounds.bgm.loop = true;

        const FRAME_COUNTS = { idle: 10, walk: 10, jump: 10, punch: 10, kick: 10, hit: 4 };
        const ANIMS = { idle: 0, walk: 1, jump: 2, punch: 3, kick: 4, hit: 0 };

        const P1_SHEET = new Image(); const P2_SHEET = new Image(); const BG_IMG = new Image();
        let loaded = 0;
        const check = () => { loaded++; document.getElementById("load-bar").style.width = (loaded/3)*100 + "%"; if (loaded === 3) { document.getElementById("loading-gate").classList.add("hidden"); document.getElementById("vs-screen").classList.remove("hidden"); } };
        P1_SHEET.onload = P2_SHEET.onload = BG_IMG.onload = check;
        
        P1_SHEET.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuD_8mhVTPsrVNdoaznLKgKKvgYwxntgmix1TrjDFGV6V2JfjXq1_gp_xpNJQxuF37ODlgoD-2wELp5CsI3I2xKWJo_KtHDFfWWqz42LmZeTvSerokWuLhP0HRdvnrCwx-gsvzQkXMEYFXOG9FlWizjRSEuzaIq1-s1sHu5vO2V1lARYrKrQN9yyNPLbTP4vgbVy6btjiu2DH9WKyzIoK7oPiXo0JD6IdyXicxeeUN8Ifwibans2QTTxgQbPwv0wOUdoxvLPSLszzPM"; // 닌자 시트
        P2_SHEET.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuC6iVUbj_xI23hlisPPukyjOcddT15wi0c5spFmhalGUzvji9FpGecbJpi854c4LCBdmKYBwylbSYrK5VomYncIdWvEqoAhAzsQQYRM7cldEnD03hkhC4czYKZSiShSWfZ_5mQb8R4emLrPqfMNcGIQ4bvPOVWzcWSsHzrCS96OW7RyB8cZ4JH3TUDCShu8wUk0WdKqb0X4080_7HYnxeb1v5_5yilBvPXzQtDE3Dyd8NeMEiuDW8ltUeTLLiryB7z_QBefSzZh3qk"; // 라이벌 시트
        BG_IMG.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBdXOXbdlxfv2UK10TPfwto_aSTrzz3gPYFk0_IsVF0uWAYx8XE7j5s1TYIRJKhikoTFfggACAk0P7iNLM5_u1sOfG5L-3Fau4_Mef_i2pmZMIKwKXsxA1Lq97RLyDVRXFePPJAd9NaaTYNDjQj9zDXk7tzO9PXU4GrbIzuF45-LbiRkSNHb9fwThVxs7oPiS0XvdSXBUu8PwJs9H4rscAnaTUUdxIRvPlyRh8IYj5gHfD6RXRnmNxzAblN2NPbWSlIVMbUV3v3YcI"; // 배경

        class Fighter {
            constructor(x, id, sheet, isPlayer) {
                this.x = x; this.y = GROUND_Y;
                this.vx = 0; this.vy = 0;
                this.hp = 100; this.id = id; this.sheet = sheet;
                this.state = "idle"; this.frame = 0; this.timer = 0;
                this.facing = isPlayer ? 1 : -1; this.isPlayer = isPlayer;
            }

            takeDamage(amt, attacker) {
                this.hp = Math.max(0, this.hp - amt); this.state = "hit";
                this.vx = attacker.facing * 8; hitstop = 5;
                sounds.hit.currentTime = 0; sounds.hit.play().catch(()=>{});
                document.getElementById(this.isPlayer ? "p1-hp" : "p2-hp-bar").style.width = this.hp + "%";
                setTimeout(() => { if(this.hp > 0) this.state = "idle"; }, 300);
            }

            update(opponent) {
                if (this.isPlayer) {
                    if (!["punch", "kick", "hit"].includes(this.state)) {
                        const L = heldKeys.has("Left"), R = heldKeys.has("Right");
                        if (L) { this.vx = -5; this.state = "walk"; }
                        else if (R) { this.vx = 5; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                        if (heldKeys.has("Up") && this.y >= GROUND_Y) { this.vy = -13; this.state = "jump"; }
                    }
                } else {
                    const d = Math.abs(this.x - opponent.x);
                    if (d > 75) { this.vx = this.x < opponent.x ? 1.8 : -1.8; this.state = "walk"; }
                    else { this.vx = 0; if(Math.random() < 0.04) this.attack(opponent, "punch"); else this.state = "idle"; }
                }

                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; if(this.state === "jump") this.state = "idle"; }
                this.x = Math.max(30, Math.min(354, this.x));
                this.facing = this.x < opponent.x ? 1 : -1;

                if (Date.now() - this.timer > 80) {
                    this.frame = (this.frame + 1) % FRAME_COUNTS[this.state];
                    this.timer = Date.now();
                    if (["punch", "kick"].includes(this.state) && this.frame === 0) this.state = "idle";
                }
            }

            attack(target, type) {
                if (["punch", "kick"].includes(this.state)) return;
                this.state = type; this.frame = 0;
                if (Math.abs(this.x - target.x) < 70) target.takeDamage(10, this);
            }

            // 🛠️ 해결: 시트 크기 기반 정밀 드로잉 (실종 방지)
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.facing, 1);
                if (this.sheet.complete && this.sheet.width > 0) {
                    const sw = this.sheet.width / 10;
                    const sh = this.sheet.height / 8;
                    const sy = ANIMS[this.state] * sh;
                    const sx = this.frame * sw;
                    ctx.drawImage(this.sheet, sx, sy, sw, sh, -DRAW_SIZE/2, -DRAW_SIZE, DRAW_SIZE, DRAW_SIZE);
                } else {
                    ctx.fillStyle = this.isPlayer ? "#00f2ff" : "#ec5b13";
                    ctx.fillRect(-20, -70, 40, 70);
                }
                ctx.restore();
            }
        }

        let p1, p2;
        function loop() {
            if (hitstop > 0) { hitstop--; requestAnimationFrame(loop); return; }
            ctx.drawImage(BG_IMG, 0, 0, 384, 224);
            p1.update(p2); p2.update(p1);
            p1.draw(); p2.draw();
            if (active) requestAnimationFrame(loop);
        }

        const bind = (id, key) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); heldKeys.add(key); };
            el.onpointerup = (e) => { e.preventDefault(); heldKeys.delete(key); };
        };

        document.getElementById("start-btn").onclick = () => {
            sounds.bgm.play().catch(()=>{});
            document.getElementById("vs-screen").classList.add("opacity-0");
            setTimeout(() => {
                document.getElementById("vs-screen").remove();
                document.getElementById("ui-layer").classList.remove("hidden");
                p1 = new Fighter(80, "NINJA", P1_SHEET, true); 
                p2 = new Fighter(300, "RYU", P2_SHEET, false);
                bind("left", "Left"); bind("right", "Right"); bind("up", "Up"); bind("down", "Down");
                document.getElementById("btn-p").onpointerdown = () => p1.attack(p2, "punch");
                document.getElementById("btn-k").onpointerdown = () => p1.attack(p2, "kick");
                active = true; loop();
            }, 600);
        };
    </script>
</body>
</html>
