<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Fighter</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
}
canvas {
  display:block;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let p1 = { x:200, y:0, w:60, h:120, hp:100 };
let p2 = { x:800, y:0, w:60, h:120, hp:100 };
let ground = 0;

function drawBackground(){
  let grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,"#001");
  grad.addColorStop(1,"#503090");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ground = canvas.height - 150;

  ctx.fillStyle = "#222";
  ctx.fillRect(0, ground, canvas.width, 10);
}

function drawHUD(){
  ctx.fillStyle="white";
  ctx.font="20px monospace";

  // HP Bars
  ctx.fillStyle="red";
  ctx.fillRect(50,40,300,20);
  ctx.fillRect(canvas.width-350,40,300,20);

  ctx.fillStyle="lime";
  ctx.fillRect(50,40,3*p1.hp,20);
  ctx.fillRect(canvas.width-350 + (300-3*p2.hp),40,3*p2.hp,20);

  ctx.fillStyle="white";
  ctx.fillText("PLAYER 1",50,30);
  ctx.fillText("PLAYER 2",canvas.width-150,30);

  ctx.font="30px monospace";
  ctx.fillText("99",canvas.width/2-15,50);
}

function drawPlayer(p,color){
  ctx.fillStyle=color;
  ctx.fillRect(p.x, ground-p.h, p.w, p.h);
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBackground();
  drawHUD();
  drawPlayer(p1,"cyan");
  drawPlayer(p2,"magenta");

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
