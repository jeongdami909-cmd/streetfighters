<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스트리트 코딩 파이터 v3.0</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', monospace;
            text-align: center;
            overflow: hidden; /* 진동 효과 시 스크롤 방지 */
            transition: background-color 0.1s;
        }
        /* 화면 흔들림 애니메이션 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(3px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            80% { transform: translate(3px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(1deg); }
        }
        .shake { animation: shake 0.3s; }
        .hit-flash { background-color: #441111; }

        .hp-container { width: 45%; height: 30px; background: #333; border: 2px solid #fff; position: relative; }
        .hp-bar { height: 100%; background: #00ff00; width: 100%; transition: width 0.3s; }
        
        #stage { font-size: 8rem; margin: 50px; position: relative; }
        #damage-text {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4444;
            font-weight: bold;
            font-size: 2rem;
            opacity: 0;
            transition: opacity 0.3s, top 0.3s;
        }
        #code-input {
            font-size: 2rem; padding: 15px; width: 300px;
            background: #000; color: #00ff00; border: 3px solid #00ff00; outline: none;
        }
    </style>
</head>
<body>
    <h1>STREET CODING FIGHTER v3.0</h1>
    
    <div style="display: flex; justify-content: space-around; margin: 20px;">
        <div class="hp-container"><div id="p-hp" class="hp-bar"></div></div>
        <div class="hp-container"><div id="e-hp" class="hp-bar"></div></div>
    </div>

    <div id="stage">
        <span id="damage-text">-15!</span>
        <div id="chars">🧑‍💻 vs 👾</div>
    </div>

    <input type="text" id="code-input" placeholder="Type: a, s, h" autofocus>
    
    <p style="color: #888; margin-top: 20px;">
        Commands: <strong>a</strong> (Attack) | <strong>s</strong> (Smash) | <strong>h</strong> (Heal)
    </p>

    <script>
        const input = document.getElementById('code-input');
        const pBar = document.getElementById('p-hp');
        const eBar = document.getElementById('e-hp');
        const stage = document.getElementById('stage');
        const dmgText = document.getElementById('damage-text');
        
        let pHP = 100, eHP = 100;

        function triggerEffect(isEnemy) {
            document.body.classList.add('shake');
            if (isEnemy) document.body.classList.add('hit-flash');
            
            setTimeout(() => {
                document.body.classList.remove('shake', 'hit-flash');
            }, 300);
        }

        function showDamage(val) {
            dmgText.innerText = `-${val}!`;
            dmgText.style.opacity = 1;
            dmgText.style.top = "-50px";
            setTimeout(() => {
                dmgText.style.opacity = 0;
                dmgText.style.top = "-20px";
            }, 500);
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = e.target.value.trim().toLowerCase();
                e.target.value = '';

                if (cmd === 'a' || cmd === 'atk') {
                    eHP -= 10;
                    showDamage(10);
                    triggerEffect(false);
                } else if (cmd === 's' || cmd === 'smash') {
                    eHP -= 25;
                    showDamage(25);
                    triggerEffect(false);
                } else if (cmd === 'h' || cmd === 'heal') {
                    pHP = Math.min(100, pHP + 20);
                }

                pBar.style.width = pHP + '%';
                eBar.style.width = eHP + '%';
                
                if (eHP <= 0) alert("BUG DEFEATED!");
            }
        });

        // 적 자동 공격
        setInterval(() => {
            if (pHP > 0 && eHP > 0) {
                pHP -= 5;
                pBar.style.width = pHP + '%';
                triggerEffect(true);
                if (pHP <= 0) alert("GAME OVER...");
            }
        }, 3000);
    </script>
</body>
</html>
