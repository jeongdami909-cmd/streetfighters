<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>STREET CODING FIGHTER v11.0 - COLLISION CORE</title>
<style>
    body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); border: 4px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1); }
</style>
</head>
<body>

<canvas id="game" width="960" height="540"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 환경 변수
const GRAVITY = 0.8;
const GROUND_Y = 480;
let keys = {};

window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// 판정 박스 클래스
class Box {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
    }
    // 박스 간 충돌 체크 (AABB 알고리즘)
    intersects(other) {
        return this.x < other.x + other.w &&
               this.x + this.w > other.x &&
               this.y < other.y + other.h &&
               this.y + this.h > other.y;
    }
}

class Fighter {
    constructor(x, color, name, controls) {
        this.name = name;
        this.x = x;
        this.y = GROUND_Y;
        this.vx = 0;
        this.vy = 0;
        this.color = color;
        this.controls = controls;

        // 상태 머신
        this.state = "idle";
        this.hp = 100;
        this.facing = x < 480 ? 1 : -1;
        this.isHit = false;

        // 박스 설정 (SF2 튜토리얼 5편 기준)
        this.width = 80;
        this.height = 160;
    }

    // 1. Push Box: 서로 밀어내는 영역 (몸체)
    getPushBox() {
        return new Box(this.x - 30, this.y - 120, 60, 120);
    }

    // 2. Hurt Box: 공격을 받는 영역
    getHurtBoxes() {
        return [
            new Box(this.x - 25, this.y - 150, 50, 40), // 머리
            new Box(this.x - 35, this.y - 110, 70, 110) // 몸통
        ];
    }

    // 3. Hit Box: 공격이 발생하는 영역
    getHitBox() {
        if (this.state !== "attack") return null;
        // 공격 시에만 주먹 위치에 생성
        return new Box(this.x + (this.facing * 40), this.y - 110, 60, 40);
    }

    update(opponent) {
        if (this.hp <= 0) return;

        // 기본 이동 로직
        if (this.state !== "attack" && this.state !== "hit") {
            if (keys[this.controls.right]) {
                this.vx = 5;
                this.facing = 1;
                this.state = "walk";
            } else if (keys[this.controls.left]) {
                this.vx = -5;
                this.facing = -1;
                this.state = "walk";
            } else {
                this.vx = 0;
                this.state = "idle";
            }

            if (keys[this.controls.up] && this.y >= GROUND_Y) {
                this.vy = -18;
                this.state = "jump";
            }

            if (keys[this.controls.attack]) {
                this.state = "attack";
                setTimeout(() => { if(this.state === "attack") this.state = "idle"; }, 300);
            }
        }

        // 물리 연산
        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;

        if (this.y >= GROUND_Y) {
            this.y = GROUND_Y;
            this.vy = 0;
        }

        // 4. Push Box 충돌 처리 (서로 통과 방지)
        const myPush = this.getPushBox();
        const opPush = opponent.getPushBox();
        if (myPush.intersects(opPush)) {
            const overlap = (myPush.x + myPush.w / 2) - (opPush.x + opPush.w / 2);
            this.x += overlap > 0 ? 2 : -2;
            opponent.x += overlap > 0 ? -2 : 2;
        }

        // 5. Hit/Hurt Box 충돌 처리 (공격 판정)
        const myHit = this.getHitBox();
        const opHurts = opponent.getHurtBoxes();
        if (myHit) {
            opHurts.forEach(hurt => {
                if (myHit.intersects(hurt) && opponent.state !== "hit") {
                    opponent.takeDamage(10);
                }
            });
        }
    }

    takeDamage(amt) {
        this.hp -= amt;
        this.state = "hit";
        this.vx = this.facing * -4; // 넉백
        setTimeout(() => { if(this.state === "hit") this.state = "idle"; }, 400);
    }

    draw() {
        // 캐릭터 렌더링 (그라데이션 박스)
        const grad = ctx.createLinearGradient(this.x, this.y - this.height, this.x, this.y);
        grad.addColorStop(0, this.color);
        grad.addColorStop(1, "#000");
        ctx.fillStyle = grad;
        ctx.fillRect(this.x - this.width/2, this.y - this.height, this.width, this.height);

        // 디버그 모드: 판정 박스 시각화 (진짜 개발자용)
        this.drawDebugBoxes();

        // 이름 및 HP
        ctx.fillStyle = "white";
        ctx.font = "20px Courier New";
        ctx.fillText(`${this.name}: ${this.hp}`, this.x - 40, this.y - 170);
    }

    drawDebugBoxes() {
        // Push Box (Green)
        ctx.strokeStyle = "#39ff14";
        const pb = this.getPushBox();
        ctx.strokeRect(pb.x, pb.y, pb.w, pb.h);

        // Hurt Box (Blue)
        ctx.strokeStyle = "#00f3ff";
        this.getHurtBoxes().forEach(hb => ctx.strokeRect(hb.x, hb.y, hb.w, hb.h));

        // Hit Box (Red)
        const hit = this.getHitBox();
        if (hit) {
            ctx.strokeStyle = "#ff073a";
            ctx.strokeRect(hit.x, hit.y, hit.w, hit.h);
        }
    }
}

// 플레이어 생성
const player1 = new Fighter(200, "cyan", "PLAYER 1", { left: 'a', right: 'd', up: 'w', attack: 'f' });
const player2 = new Fighter(700, "magenta", "PLAYER 2", { left: 'j', right: 'l', up: 'i', attack: 'h' });

function gameLoop(time) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 배경 노을 연출 (모네 스타일 그라디언트)
    const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
    sky.addColorStop(0, "#2c3e50");
    sky.addColorStop(0.5, "#000");
    sky.addColorStop(1, "#6a5acd");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    player1.update(player2);
    player2.update(player1);

    player1.draw();
    player2.draw();

    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>

</body>
</html>
