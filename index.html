<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS STRIKE: NEON FURY</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
    body { margin: 0; background: #101922; overflow: hidden; touch-action: none; font-family: 'Space Grotesk', sans-serif; }
    canvas { image-rendering: pixelated; object-fit: contain; width: 100vw; height: 100vh; display: block; }
    
    /* 🛠️ 오버레이 및 버튼 디자인 */
    #overlay { position: fixed; inset: 0; background: rgba(16,25,34,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: #0df2f2; }
    .neon-btn { padding: 15px 60px; font-size: 1.5rem; background: #ff00ff; color: white; border: 3px solid #fff; border-radius: 4px; font-weight: 900; italic: true; box-shadow: 0 0 30px #ff00ff; cursor: pointer; }
    
    #controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 500; pointer-events: none; }
    .d-pad, .actions { display: grid; gap: 8px; pointer-events: auto; }
    .btn { 
        width: 65px; height: 65px; background: rgba(13,242,242,0.1); border: 2px solid #0df2f2; border-radius: 8px;
        color: #0df2f2; display: flex; align-items: center; justify-content: center; font-weight: 900;
        user-select: none; -webkit-tap-highlight-color: transparent; transition: 0.1s;
    }
    .btn:active { background: #0df2f2; color: #101922; transform: scale(0.9); box-shadow: 0 0 15px #0df2f2; }
    .btn-sp { border-color: #ff00ff; color: #ff00ff; }
    .btn-sp:active { background: #ff00ff; color: #fff; box-shadow: 0 0 15px #ff00ff; }
</style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 3rem; italic: true; text-shadow: 0 0 20px #0df2f2;">NEXUS STRIKE</h1>
    <p style="color: #ff00ff; letter-spacing: 5px; margin-bottom: 30px;">NEON FURY: MAYA RISING</p>
    <button id="start-btn" class="neon-btn">READY TO FIGHT</button>
</div>

<canvas id="game" width="384" height="224"></canvas>

<div id="controls">
    <div class="d-pad">
        <div style="grid-column: 2"><div class="btn" id="up">UP</div></div>
        <div style="grid-column: 1"><div class="btn" id="left">◀</div></div>
        <div style="grid-column: 3"><div class="btn" id="right">▶</div></div>
        <div style="grid-column: 2"><div class="btn" id="down">DN</div></div>
    </div>
    <div class="actions" style="grid-template-columns: repeat(2, 1fr);">
        <div class="btn" id="lp">LP</div>
        <div class="btn" id="hp">HP</div>
        <div class="btn" id="lk">LK</div>
        <div class="btn btn-sp" id="sp">SP</div>
    </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const GROUND_Y = 195;
const GRAVITY = 0.6;

// 🛠️ 마야 스프라이트 데이터 매핑
const SPRITE_URLS = {
    bg: "https://lh3.googleusercontent.com/aida-public/AB6AXuC4FeZ34s6B8cMopF2IaZyxtIGBeNsb2oErNLpxO-qxnAaW3crKxVHRWVkwG3D_0YwbL91E_SrvuN4CyGbS249MI6TZZAkOD1u3ZGU-cR-b1xclhmlLhbstmX8zeNL27HqJUJe89S-24yOp8zuq4hd0k6IlZQ-xe0Aphws4VpTMCfSZAHDiiGjSe9ebZf5bXr9yAtx9Dn8JQ-5iXi0BukAM1unvr7q8NsTFUoiMiocZUmEx0rPXlbEIiH9QR-RlB-G-V7l8Bnlqxc5C",
    maya: Array.from({length: 11}, (_, i) => `http://googleusercontent.com/profile/picture/${13 + i}`),
    bruno: "https://lh3.googleusercontent.com/aida-public/AB6AXuBuPdanKJbkdOYaT3-IZH-6c2_1EH8e9i3hf7xpii8jObmiVU_mGrASl1jNhiLSX1YKFwtgvSa5AEUKH0EqTqe45fhjal-Uz17mMxbkD1VVt8MkemIYtQdtNWZaVxfbPUTTzB9QiMyh88dsk0Sw3jAsr1WQSgIfEXF7QSMHWqP16jSxNzB5pvichtq-MACtTWCnH5De3tJxFRLDmm4kvVcKAZ6LaUGwV98UPGhd9LwQ0fLZY0vXpSkINZ56DL4pqlflBiyG4oDNMTUq"
};

const IMAGES = {};
function loadAssets() {
    IMAGES.bg = new Image(); IMAGES.bg.src = SPRITE_URLS.bg;
    IMAGES.bruno = new Image(); IMAGES.bruno.src = SPRITE_URLS.bruno;
    IMAGES.maya = SPRITE_URLS.maya.map(url => {
        const img = new Image(); img.src = url; return img;
    });
}

const heldKeys = new Set();
const ANIMS = {
    idle: [0], walk: [1, 2], jump: [3], punch: [4, 5], kick: [6, 7], special: [8, 9, 10]
};

class Fighter {
    constructor(x, id, isPlayer) {
        this.x = x; this.y = GROUND_Y;
        this.vx = 0; this.vy = 0;
        this.hp = 100; this.id = id;
        this.currentState = "idle";
        this.frameIndex = 0;
        this.animTimer = 0;
        this.facing = isPlayer ? 1 : -1;
        this.isPlayer = isPlayer;
    }

    update(time, opponent) {
        if (this.isPlayer) {
            const isL = heldKeys.has("Left"); const isR = heldKeys.has("Right");
            if (this.currentState !== "jump" && !["punch","kick","special"].includes(this.currentState)) {
                if (isL) { this.vx = -3; this.currentState = "walk"; }
                else if (isR) { this.vx = 3; this.currentState = "walk"; }
                else { this.vx = 0; this.currentState = "idle"; }
                if (heldKeys.has("Up") && this.y >= GROUND_Y) { this.vy = -12; this.currentState = "jump"; }
            }
        }

        this.vy += GRAVITY;
        this.x += this.vx; this.y += this.vy;
        if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; if (this.currentState === "jump") this.currentState = "idle"; }
        this.x = Math.max(30, Math.min(354, this.x));

        // 애니메이션 루프
        if (time - this.animTimer > 120) {
            const sequence = ANIMS[this.currentState];
            this.frameIndex = (this.frameIndex + 1) % sequence.length;
            this.animTimer = time;
            if (this.frameIndex === 0 && ["punch","kick","special"].includes(this.currentState)) {
                this.currentState = "idle";
            }
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.facing, 1);
        const imgIdx = ANIMS[this.currentState][this.frameIndex];
        const img = this.isPlayer ? IMAGES.maya[imgIdx] : IMAGES.bruno;
        
        // 🛠️ 마야 스프라이트 출력 (64x64 크기 최적화)
        ctx.drawImage(img, -32, -64, 64, 64);
        ctx.restore();
    }
}

let p1, p2;
function drawHUD() {
    // 🛠️ 사용자 디자인 UI 이식
    ctx.fillStyle = "#101922aa"; ctx.fillRect(10, 10, 150, 15); ctx.fillRect(224, 10, 150, 15);
    ctx.fillStyle = "#ff00ff"; ctx.fillRect(10, 10, 150, 15); // 배경
    ctx.fillStyle = "#0df2f2"; ctx.fillRect(10, 10, p1.hp * 1.5, 15); // P1 HP
    ctx.fillStyle = "#ef4444"; ctx.fillRect(224, 10, p2.hp * 1.5, 15); // P2 HP
    
    ctx.fillStyle = "white"; ctx.font = "bold 12px Space Grotesk";
    ctx.fillText("MAYA", 15, 22); ctx.textAlign = "right"; ctx.fillText("BRUNO", 370, 22);
    ctx.textAlign = "center"; ctx.font = "bold 20px Space Grotesk";
    ctx.fillText("99", 192, 25);
}

function loop(t) {
    ctx.drawImage(IMAGES.bg, 0, 0, 384, 224); // 넥서스 스트라이크 배경
    p1.update(t, p2); p2.update(t, p1);
    p1.draw(); p2.draw();
    drawHUD();
    requestAnimationFrame(loop);
}

// 🛠️ 버튼 조작 버그 완전 수정
function bind(id, code) {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); heldKeys.add(code); };
    const end = (e) => { e.preventDefault(); heldKeys.delete(code); };
    el.addEventListener('touchstart', start, {passive: false});
    el.addEventListener('touchend', end, {passive: false});
    el.addEventListener('mousedown', start); el.addEventListener('mouseup', end);
}

document.getElementById("start-btn").onclick = () => {
    loadAssets();
    p1 = new Fighter(100, "MAYA", true);
    p2 = new Fighter(280, "BRUNO", false);
    
    bind("left", "Left"); bind("right", "Right"); bind("up", "Up");
    const action = (type) => { if(p1.currentState === "idle") { p1.currentState = type; p1.frameIndex = 0; if(Math.abs(p1.x-p2.x)<60) p2.hp -= 10; } };
    document.getElementById("lp").onpointerdown = () => action("punch");
    document.getElementById("lk").onpointerdown = () => action("kick");
    document.getElementById("hp").onpointerdown = () => action("kick"); // 강공격 매핑
    document.getElementById("sp").onpointerdown = () => action("special");

    document.getElementById("overlay").remove();
    requestAnimationFrame(loop);
};
</script>
</body>
</html>
