<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Nexus Strike: Neon Fury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#258cf4", "secondary": "#ff00ff", "background-dark": "#101922" }, fontFamily: { "display": ["Space Grotesk"] } } }
        }
    </script>
    <style>
        body { background: #101922; overflow: hidden; touch-action: none; font-family: 'Space Grotesk', sans-serif; }
        canvas { image-rendering: pixelated; object-fit: contain; width: 100vw; height: 100vh; display: block; }
        .pixelated { image-rendering: pixelated; }
        /* 페이드 효과용 */
        .scene { transition: opacity 0.5s ease-in-out; }
        .hidden { display: none !important; opacity: 0; }
    </style>
</head>
<body class="text-slate-100 antialiased">

    <div id="select-screen" class="scene fixed inset-0 z-[100] bg-background-dark flex flex-col overflow-y-auto">
        <header class="flex items-center p-4 border-b border-primary/20">
            <div class="flex-1 text-center"><h1 class="text-xl font-bold uppercase italic text-primary">Nexus Strike: Neon Fury</h1></div>
        </header>
        <main class="flex-1 p-4 lg:p-8 flex flex-col items-center gap-6 max-w-7xl mx-auto w-full">
            <div class="flex flex-col lg:flex-row gap-8 items-start w-full">
                <div class="w-full lg:w-1/2 flex flex-col gap-6">
                    <div class="relative rounded-xl border-2 border-primary overflow-hidden shadow-[0_0_20px_rgba(37,140,244,0.3)]">
                        <div id="hero-img" class="aspect-[4/5] bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAk4gjewnysuC4jHejZLL-CnVyOTKGLTwatIpA1N6bSfDVt2QxdQsW-JaNJNXSglfgIE511mLmoM9gRzh5DfAjIW0pySv397FE4JuzEqlKkxYBRidpoqD-MCKGcr4LoKOcDOnEQ60PQVUWAHOG4Ck6zzAG9T-MVOP7UHqL-BsNPWOvKF9DmjEzDQv-HDWhpuogdk_EIYSzUBbnjaxZnpFhD-0hRgr3mPI7CHsSEDH1qIie5RpW7cvxeBCRBUXtZgfT_F0c0Rl2KJjV1');"></div>
                        <div class="absolute bottom-0 left-0 p-6 w-full bg-gradient-to-t from-background-dark to-transparent">
                            <h2 id="hero-name" class="text-5xl font-bold uppercase italic text-white">KAI</h2>
                            <p class="text-primary font-medium">THE NEON FIST</p>
                        </div>
                    </div>
                </div>
                <div class="w-full lg:w-1/2 flex flex-col gap-6">
                    <h3 class="text-xl font-bold uppercase">Select Character</h3>
                    <div class="grid grid-cols-4 gap-3">
                        <div class="aspect-square rounded-lg border-2 border-primary bg-primary/20 p-1 cursor-pointer" onclick="selectHero('KAI')">
                            <div class="w-full h-full rounded bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBV2EGrt7dffIdMuyKwKH9RvzV3ifY-GDzWxbZD4-MddcDKa0DzK_5O4_d797Mik3DHE1Pwq-j-pLhGzdFyykkQXH9eXwIyKncvAOXbLBqeJ7HiGwbLKCJ93TKXVT-2vg2hgF9efi2gCCEOvdtL8amHz9EwAZeE5j-8vhGMqsCOnVeECf0aE-x98BOPBr96-5Hzte1aOw9weH5aUfqTgULGBSGKvS2oxY2yCGg53X9GC1kbqHn3ssT8YjyiyGV9TvEXEXrTBFjioJjI');"></div>
                        </div>
                        <div class="aspect-square rounded-lg border border-slate-700 bg-slate-800/20 p-1 flex items-center justify-center opacity-50 cursor-not-allowed">
                            <span class="material-symbols-outlined text-slate-600">lock</span>
                        </div>
                    </div>
                    <button id="lock-btn" class="w-full py-4 bg-primary text-white font-bold text-xl uppercase italic rounded-lg shadow-[0_0_20px_rgba(37,140,244,0.4)] hover:scale-[1.02] transition-transform">
                        Lock Selection
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="game-screen" class="scene hidden fixed inset-0 z-0">
        <div class="absolute top-6 left-0 right-0 z-20 flex justify-between px-6 items-start gap-4 pointer-events-none">
            <div class="w-[40%]">
                <div class="flex justify-between text-white font-bold italic mb-1"><span>KAI</span><span id="p1-hp-text">100%</span></div>
                <div class="h-4 bg-slate-800 rounded border border-white/10"><div id="p1-hp-bar" class="h-full bg-primary" style="width: 100%"></div></div>
            </div>
            <div class="flex flex-col items-center"><div class="bg-slate-900/80 border-2 border-primary rounded-xl px-4 py-2"><p id="timer" class="text-white text-3xl font-bold">99</p></div></div>
            <div class="w-[40%] text-right">
                <div class="flex justify-between text-white font-bold italic mb-1"><span id="p2-hp-text">100%</span><span>BRUNO</span></div>
                <div class="h-4 bg-slate-800 rounded border border-white/10 scale-x-[-1]"><div id="p2-hp-bar" class="h-full bg-red-500" style="width: 100%"></div></div>
            </div>
        </div>

        <canvas id="game" width="384" height="224"></canvas>

        <div class="absolute bottom-8 left-0 right-0 px-8 flex justify-between items-end">
            <div class="grid grid-cols-3 gap-2 pointer-events-auto">
                <div class="size-14"></div><button id="ctrl-up" class="size-14 bg-slate-800/80 rounded-lg flex items-center justify-center border-t-2 border-slate-700 text-white">▲</button><div class="size-14"></div>
                <button id="ctrl-left" class="size-14 bg-slate-800/80 rounded-lg flex items-center justify-center border-l-2 border-slate-700 text-white">◀</button><div class="size-14"></div><button id="ctrl-right" class="size-14 bg-slate-800/80 rounded-lg flex items-center justify-center border-r-2 border-slate-700 text-white">▶</button>
            </div>
            <div class="grid grid-cols-2 gap-4 pointer-events-auto">
                <button id="atk-lp" class="size-16 bg-primary/80 rounded-full border-b-4 border-blue-800 text-white font-black">LP</button>
                <button id="atk-hp" class="size-16 bg-red-600/80 rounded-full border-b-4 border-red-800 text-white font-black">HP</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 195;
        const GRAVITY = 0.6;
        const heldKeys = new Set();

        // 캐릭터 데이터셋
        const HEROES = {
            KAI: { speed: 4, power: 10, img: "https://lh3.googleusercontent.com/aida-public/AB6AXuAk4gjewnysuC4jHejZLL-CnVyOTKGLTwatIpA1N6bSfDVt2QxdQsW-JaNJNXSglfgIE511mLmoM9gRzh5DfAjIW0pySv397FE4JuzEqlKkxYBRidpoqD-MCKGcr4LoKOcDOnEQ60PQVUWAHOG4Ck6zzAG9T-MVOP7UHqL-BsNPWOvKF9DmjEzDQv-HDWhpuogdk_EIYSzUBbnjaxZnpFhD-0hRgr3mPI7CHsSEDH1qIie5RpW7cvxeBCRBUXtZgfT_F0c0Rl2KJjV1" }
        };

        const SPRITES = {
            bg: new Image(),
            bruno: new Image(),
            kai: Array.from({length: 11}, (_, i) => { 
                const img = new Image(); 
                img.src = `http://googleusercontent.com/profile/picture/${13 + i}`; 
                return img; 
            })
        };
        SPRITES.bg.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuC4FeZ34s6B8cMopF2IaZyxtIGBeNsb2oErNLpxO-qxnAaW3crKxVHRWVkwG3D_0YwbL91E_SrvuN4CyGbS249MI6TZZAkOD1u3ZGU-cR-b1xclhmlLhbstmX8zeNL27HqJUJe89S-24yOp8zuq4hd0k6IlZQ-xe0Aphws4VpTMCfSZAHDiiGjSe9ebZf5bXr9yAtx9Dn8JQ-5iXi0BukAM1unvr7q8NsTFUoiMiocZUmEx0rPXlbEIiH9QR-RlB-G-V7l8Bnlqxc5C";
        SPRITES.bruno.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBuPdanKJbkdOYaT3-IZH-6c2_1EH8e9i3hf7xpii8jObmiVU_mGrASl1jNhiLSX1YKFwtgvSa5AEUKH0EqTqe45fhjal-Uz17mMxbkD1VVt8MkemIYtQdtNWZaVxfbPUTTzB9QiMyh88dsk0Sw3jAsr1WQSgIfEXF7QSMHWqP16jSxNzB5pvichtq-MACtTWCnH5De3tJxFRLDmm4kvVcKAZ6LaUGwV98UPGhd9LwQ0fLZY0vXpSkINZ56DL4pqlflBiyG4oDNMTUq";

        class Fighter {
            constructor(x, id, isPlayer) {
                this.x = x; this.y = GROUND_Y;
                this.vx = 0; this.vy = 0;
                this.hp = 100; this.id = id;
                this.currentState = "idle";
                this.frameIndex = 0; this.animTimer = 0;
                this.facing = isPlayer ? 1 : -1;
                this.isPlayer = isPlayer;
                this.isHit = false;
            }

            // 🛠️ AI 로직 탑재
            updateAI(opponent, time) {
                if (this.isHit || ["punch","kick"].includes(this.currentState)) return;
                const dist = Math.abs(this.x - opponent.x);
                if (dist > 60) { this.vx = this.x < opponent.x ? 1.5 : -1.5; this.currentState = "walk"; }
                else { this.vx = 0; if(Math.random() < 0.05) this.attack(opponent); else this.currentState = "idle"; }
            }

            attack(opponent) {
                this.currentState = "punch"; this.frameIndex = 0;
                if (Math.abs(this.x - opponent.x) < 55) opponent.takeDamage(10);
            }

            takeDamage(amt) {
                this.hp = Math.max(0, this.hp - amt); this.isHit = true;
                setTimeout(() => this.isHit = false, 200);
                updateHUD();
            }

            update(time, opponent) {
                if (this.isPlayer) {
                    if (heldKeys.has("Left")) { this.vx = -3.5; this.currentState = "walk"; }
                    else if (heldKeys.has("Right")) { this.vx = 3.5; this.currentState = "walk"; }
                    else { this.vx = 0; this.currentState = "idle"; }
                    if (heldKeys.has("Up") && this.y >= GROUND_Y) { this.vy = -12; }
                } else { this.updateAI(opponent, time); }

                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; }
                this.x = Math.max(20, Math.min(364, this.x));
                this.facing = this.x < opponent.x ? 1 : -1;

                if (time - this.animTimer > 100) {
                    this.frameIndex = (this.frameIndex + 1) % (this.currentState === "walk" ? 2 : 1);
                    this.animTimer = time;
                    if (this.currentState === "punch" && this.frameIndex === 0) this.currentState = "idle";
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.facing, 1);
                const img = this.isPlayer ? SPRITES.kai[this.currentState === "punch" ? 5 : (this.currentState === "walk" ? this.frameIndex+1 : 0)] : SPRITES.bruno;
                if (this.isHit) ctx.filter = "brightness(3)";
                ctx.drawImage(img, -32, -64, 64, 64);
                ctx.restore();
            }
        }

        let p1, p2, gameActive = false;

        function updateHUD() {
            document.getElementById("p1-hp-bar").style.width = p1.hp + "%";
            document.getElementById("p2-hp-bar").style.width = p2.hp + "%";
            document.getElementById("p1-hp-text").innerText = p1.hp + "%";
            document.getElementById("p2-hp-text").innerText = p2.hp + "%";
        }

        function gameLoop(t) {
            if (!gameActive) return;
            ctx.drawImage(SPRITES.bg, 0, 0, 384, 224);
            p1.update(t, p2); p2.update(t, p1);
            p1.draw(); p2.draw();
            requestAnimationFrame(gameLoop);
        }

        // 🛠️ 조작 버튼 바인딩
        function setupButtons() {
            const bind = (id, key) => {
                const el = document.getElementById(id);
                el.onpointerdown = (e) => { e.preventDefault(); heldKeys.add(key); };
                el.onpointerup = (e) => { e.preventDefault(); heldKeys.delete(key); };
            };
            bind("ctrl-left", "Left"); bind("ctrl-right", "Right"); bind("ctrl-up", "Up");
            document.getElementById("atk-lp").onpointerdown = () => p1.attack(p2);
            document.getElementById("atk-hp").onpointerdown = () => p1.attack(p2);
        }

        // 시작 핸들러
        document.getElementById("lock-btn").onclick = () => {
            document.getElementById("select-screen").classList.add("hidden");
            document.getElementById("game-screen").classList.remove("hidden");
            p1 = new Fighter(80, "KAI", true);
            p2 = new Fighter(300, "BRUNO", false);
            setupButtons();
            gameActive = true;
            requestAnimationFrame(gameLoop);
        };
    </script>
</body>
</html>
