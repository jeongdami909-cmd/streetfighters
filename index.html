<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Nexus Strike: Daigo Legacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#00f2ff", "accent": "#ff00ea", "background": "#050505" } } } }
    </script>
    <style>
        html, body { height: 100dvh; margin: 0; padding: 0; background: #050505; overflow: hidden; touch-action: manipulation; font-family: 'Public Sans', sans-serif; }
        canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; image-rendering: pixelated; object-fit:contain; }
        #ui-layer { position: relative; z-index: 50; width: 100%; height: 100dvh; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .glitch { text-shadow: 2px 0 #ff00ea, -2px 0 #00f2ff; }
        .btn:active { background: #00f2ff; color: #000; transform: scale(0.9); box-shadow: 0 0 20px #00f2ff; }
    </style>
</head>
<body class="text-white select-none">

    <div id="vs-screen" class="interactive fixed inset-0 z-[100] bg-background flex flex-col items-center justify-center min-h-[100dvh]">
        <h1 class="text-6xl font-black italic text-primary glitch mb-10 italic">NEXUS STRIKE</h1>
        <div class="flex gap-10 items-center">
            <div class="size-44 border-2 border-primary rounded-xl bg-cover bg-center shadow-2xl" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAk4gjewnysuC4jHejZLL-CnVyOTKGLTwatIpA1N6bSfDVt2QxdQsW-JaNJNXSglfgIE511mLmoM9gRzh5DfAjIW0pySv397FE4JuzEqlKkxYBRidpoqD-MCKGcr4LoKOcDOnEQ60PQVUWAHOG4Ck6zzAG9T-MVOP7UHqL-BsNPWOvKF9DmjEzDQv-HDWhpuogdk_EIYSzUBbnjaxZnpFhD-0hRgr3mPI7CHsSEDH1qIie5RpW7cvxeBCRBUXtZgfT_F0c0Rl2KJjV1');"></div>
            <div class="text-4xl font-black italic">VS</div>
            <div class="size-44 border-2 border-accent rounded-xl bg-cover bg-center shadow-2xl" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBuPdanKJbkdOYaT3-IZH-6c2_1EH8e9i3hf7xpii8jObmiVU_mGrASl1jNhiLSX1YKFwtgvSa5AEUKH0EqTqe45fhjal-Uz17mMxbkD1VVt8MkemIYtQdtNWZaVxfbPUTTzB9QiMyh88dsk0Sw3jAsr1WQSgIfEXF7QSMHWqP16jSxNzB5pvichtq-MACtTWCnH5De3tJxFRLDmm4kvVcKAZ6LaUGwV98UPGhd9LwQ0fLZY0vXpSkINZ56DL4pqlflBiyG4oDNMTUq');"></div>
        </div>
        <button id="start-btn" class="mt-12 px-16 py-5 bg-primary text-black font-black text-xl rounded-lg shadow-[0_0_40px_#00f2ff]">SYSTEM LINK START</button>
    </div>

    <div id="ui-layer">
        <div id="hud" class="hidden absolute top-6 inset-x-0 px-8 flex justify-between items-start">
            <div class="w-1/3 flex flex-col gap-1">
                <div class="flex justify-between font-black italic text-sm text-primary"><span>ZERO</span><span id="p1-hp-txt">100%</span></div>
                <div class="h-4 bg-black/40 border border-white/10 rounded-full overflow-hidden"><div id="p1-hp-bar" class="h-full bg-primary" style="width: 100%"></div></div>
            </div>
            <div class="bg-black/80 border-x-4 border-primary px-6 py-2 rounded-b-xl shadow-lg"><h2 id="timer" class="text-primary text-4xl font-black italic">99</h2></div>
            <div class="w-1/3 flex flex-col gap-1 text-right">
                <div class="flex justify-between flex-row-reverse font-black italic text-sm text-accent"><span>KAEL</span><span id="p2-hp-txt">100%</span></div>
                <div class="h-4 bg-black/40 border border-white/10 rounded-full overflow-hidden flex flex-row-reverse"><div id="p2-hp-bar" class="h-full bg-accent" style="width: 100%"></div></div>
            </div>
        </div>

        <div id="combo-ui" class="hidden absolute top-32 left-10 text-6xl font-black italic text-white glitch">
            <span id="combo-count">0</span> <span class="text-primary text-2xl">HITS!</span>
        </div>

        <div id="controls" class="hidden absolute bottom-10 inset-x-0 px-8 flex justify-between items-end">
            <div class="grid grid-cols-3 gap-3 interactive">
                <div></div><button id="up" class="btn size-16 bg-white/10 rounded-xl border-t-2 border-white/20 text-white">▲</button><div></div>
                <button id="left" class="btn size-16 bg-white/10 rounded-xl border-l-2 border-white/20 text-white">◀</button>
                <div class="size-16"></div>
                <button id="right" class="btn size-16 bg-white/10 rounded-xl border-r-2 border-white/20 text-white">▶</button>
            </div>
            <div class="grid grid-cols-2 gap-4 interactive">
                <button id="btn-p" class="btn size-20 rounded-full border-4 border-primary bg-black/60 text-primary font-black italic">P</button>
                <button id="btn-k" class="btn size-20 rounded-full border-4 border-accent bg-black/60 text-accent font-black italic">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="384" height="224"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 195;
        const GRAVITY = 0.6;
        const heldKeys = new Set();
        let hitstop = 0, shake = 0, combo = 0, comboTimer = 0;

        // 🛠️ 스프라이트 자산 매핑
        const SPRITES = {
            bg: new Image(),
            p1: Array.from({length: 11}, (_, i) => { const img = new Image(); img.src = `http://googleusercontent.com/profile/picture/${13 + i}`; return img; }),
            p2: new Image()
        };
        SPRITES.bg.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBqxvGMkpkIc9bUxOOhYj3MALyCCXoUTlWmjgZa_PoaWkrdHXTgZoFK9z3GFLPnQV0gNavZwMzBQu_Yjg6kBDfNkWBP1KCO3PVzqIrVtg7zkxJS2CPQCrc5sMgkebFVy-XDUGDNckTRUQqas54fGjA24j30B13LJhPQ9T3jHYlyuPjq9OIcT41BNPOkWsSFTaOULhPpaVwVeiEHk74KcyZDbB1NIxdoTNBCsJ7xrz77dqbNhBc_lKC4cOWWHsx5OKD53vApgFQU79A";
        SPRITES.p2.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBuPdanKJbkdOYaT3-IZH-6c2_1EH8e9i3hf7xpii8jObmiVU_mGrASl1jNhiLSX1YKFwtgvSa5AEUKH0EqTqe45fhjal-Uz17mMxbkD1VVt8MkemIYtQdtNWZaVxfbPUTTzB9QiMyh88dsk0Sw3jAsr1WQSgIfEXF7QSMHWqP16jSxNzB5pvichtq-MACtTWCnH5De3tJxFRLDmm4kvVcKAZ6LaUGwV98UPGhd9LwQ0fLZY0vXpSkINZ56DL4pqlflBiyG4oDNMTUq";

        const ANIMS = { idle: [0], walk: [1, 2], punch: [4, 5], kick: [6, 7], hit: [0] };

        class Fighter {
            constructor(x, id, isPlayer) {
                this.x = x; this.y = GROUND_Y; this.vx = 0; this.vy = 0;
                this.hp = 100; this.state = "idle"; this.frame = 0;
                this.timer = 0; this.facing = isPlayer ? 1 : -1;
                this.isPlayer = isPlayer; this.isHit = false;
            }

            takeDamage(amt, attacker) {
                this.hp = Math.max(0, this.hp - amt); this.state = "hit";
                this.vx = attacker.facing * 8; 
                hitstop = 6; shake = 12; // 타격감 강화
                
                if (attacker.isPlayer) { 
                    combo++; comboTimer = 1000;
                    document.getElementById("combo-ui").classList.remove("hidden");
                    document.getElementById("combo-count").innerText = combo;
                }

                updateHUD();
                setTimeout(() => { if(this.hp > 0) this.state = "idle"; }, 250);
            }

            update(opponent) {
                if (this.hp <= 0) return;
                
                if (this.isPlayer) {
                    if (!["punch", "kick", "hit"].includes(this.state)) {
                        const L = heldKeys.has("Left"); const R = heldKeys.has("Right");
                        if (L) { this.vx = -4; this.state = "walk"; }
                        else if (R) { this.vx = 4; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                        if (heldKeys.has("Up") && this.y >= GROUND_Y) this.vy = -12;
                    }
                } else {
                    // 🛠️ 지능형 AI 로직
                    const dist = Math.abs(this.x - opponent.x);
                    if (dist > 65) { this.vx = this.x < opponent.x ? 2 : -2; this.state = "walk"; }
                    else { this.vx = 0; if(Math.random() < 0.05) this.attack(opponent, "punch"); else this.state = "idle"; }
                }

                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; }
                this.x = Math.max(30, Math.min(354, this.x));
                this.facing = this.x < opponent.x ? 1 : -1;

                if (Date.now() - this.timer > 100) {
                    this.frame = (this.frame + 1) % ANIMS[this.state].length;
                    this.timer = Date.now();
                    if (["punch", "kick"].includes(this.state) && this.frame === 0) this.state = "idle";
                }
            }

            attack(target, type) {
                if (["punch", "kick"].includes(this.state)) return;
                this.state = type; this.frame = 0;
                new Audio('https://actions.google.com/sounds/v1/impacts/crash_metal.ogg').play().catch(()=>{});
                if (Math.abs(this.x - target.x) < 60) target.takeDamage(10, this);
            }

            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.facing, 1);
                const imgIdx = ANIMS[this.state][this.frame];
                const img = this.isPlayer ? SPRITES.p1[imgIdx] : SPRITES.p2;
                if (this.isHit) { ctx.filter = "brightness(4)"; ctx.translate(Math.random()*6-3, 0); }
                ctx.drawImage(img, -32, -64, 64, 64);
                ctx.restore();
            }
        }

        let p1, p2, active = false;

        function updateHUD() {
            document.getElementById("p1-hp-bar").style.width = p1.hp + "%";
            document.getElementById("p2-hp-bar").style.width = p2.hp + "%";
            document.getElementById("p1-hp-txt").innerText = p1.hp + "%";
            document.getElementById("p2-hp-txt").innerText = p2.hp + "%";
        }

        function loop() {
            if (hitstop > 0) { hitstop--; requestAnimationFrame(loop); return; }
            
            if (comboTimer > 0) { comboTimer -= 16; if(comboTimer <= 0) { combo = 0; document.getElementById("combo-ui").classList.add("hidden"); } }

            ctx.save();
            if (shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.85; }
            
            ctx.drawImage(SPRITES.bg, 0, 0, 384, 224);
            p1.update(p2); p2.update(p1);
            p1.draw(); p2.draw();
            ctx.restore();
            
            if (active) requestAnimationFrame(loop);
        }

        const bind = (id, key) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); heldKeys.add(key); };
            el.onpointerup = (e) => { e.preventDefault(); heldKeys.delete(key); };
        };

        document.getElementById("start-btn").onclick = () => {
            document.getElementById("vs-screen").classList.add("opacity-0");
            setTimeout(() => {
                document.getElementById("vs-screen").remove();
                document.getElementById("hud").classList.remove("hidden");
                document.getElementById("controls").classList.remove("hidden");
                p1 = new Fighter(80, "ZERO", true); p2 = new Fighter(300, "KAEL", false);
                bind("left", "Left"); bind("right", "Right"); bind("up", "Up");
                document.getElementById("btn-p").onpointerdown = () => p1.attack(p2, "punch");
                document.getElementById("btn-k").onpointerdown = () => p1.attack(p2, "kick");
                active = true; loop();
            }, 600);
        };
    </script>
</body>
</html>
