<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Nexus Strike: Battle Evolved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#ff00ff", "accent": "#00f3ff", "bg-dark": "#0a0a0c" } } } }
    </script>
    <style>
        html, body { height: 100dvh; margin: 0; padding: 0; background: #0a0a0c; overflow: hidden; touch-action: none; font-family: 'Public Sans', sans-serif; user-select: none; }
        canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; image-rendering: pixelated; object-fit:contain; }
        #ui-layer { position: relative; z-index: 100; width: 100%; height: 100dvh; pointer-events: none; }
        .interactive { pointer-events: auto; touch-action: none; }
        .btn:active { transform: scale(0.9); filter: brightness(1.8); box-shadow: 0 0 30px currentColor; }
        .btn-p:active { color: #00f3ff; }
        .btn-k:active { color: #ff00ff; }
    </style>
</head>
<body class="bg-bg-dark text-white">

    <div id="vs-screen" class="interactive fixed inset-0 z-[110] bg-bg-dark flex flex-col items-center justify-center min-h-[100dvh]">
        <h1 class="text-5xl font-black italic text-white mb-10 tracking-tighter">NEXUS STRIKE</h1>
        <button id="start-btn" class="px-14 py-6 bg-accent text-black font-black text-2xl rounded-2xl shadow-[0_0_50px_#00f3ff] uppercase italic">System Link Start</button>
    </div>

    <div id="ui-layer" class="hidden flex flex-col justify-between p-6">
        <div id="hud" class="w-full flex justify-between pointer-events-none mt-2">
            <div class="w-[42%]">
                <div class="flex justify-between font-black italic text-[12px] text-accent mb-1 uppercase"><span>[1P] AZURE</span><span id="p1-hp-txt">100%</span></div>
                <div class="h-4 bg-black border border-accent/40 rounded-sm overflow-hidden"><div id="p1-hp" class="h-full bg-accent transition-all duration-300" style="width: 100%"></div></div>
            </div>
            <div class="bg-black/90 border-x-4 border-accent px-6 py-1"><h2 id="timer" class="text-white text-3xl font-black italic">99</h2></div>
            <div class="w-[42%] text-right">
                <div class="flex justify-between flex-row-reverse font-black italic text-[12px] text-primary mb-1 uppercase"><span>[CPU] DRAGON</span><span id="p2-hp-txt">100%</span></div>
                <div class="h-4 bg-black border border-primary/40 rounded-sm overflow-hidden flex flex-row-reverse"><div id="p2-hp-bar" class="h-full bg-primary transition-all duration-300" style="width: 100%"></div></div>
            </div>
        </div>

        <div id="controls" class="absolute bottom-10 inset-x-6 flex justify-between items-end">
            <div class="grid grid-cols-3 gap-3 interactive">
                <div class="w-14"></div><button id="up" class="btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white text-xl">▲</button><div class="w-14"></div>
                <button id="left" class="btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white text-xl">◀</button><div class="w-14"></div><button id="right" class="btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white text-xl">▶</button>
                <div class="w-14"></div><button id="down" class="btn w-14 h-14 bg-white/10 border border-white/20 rounded-xl text-white text-xl">▼</button><div class="w-14"></div>
            </div>
            
            <div class="flex gap-4 interactive mb-2">
                <button id="btn-p" class="btn btn-p w-20 h-20 rounded-full border-4 border-accent bg-black/80 text-accent font-black text-3xl shadow-[0_0_20px_rgba(0,243,255,0.3)]">P</button>
                <button id="btn-k" class="btn btn-k w-20 h-20 rounded-full border-4 border-primary bg-black/80 text-primary font-black text-3xl shadow-[0_0_255,0,255,0.3)]">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="512" height="288"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 260; const GRAVITY = 0.65;
        const DRAW_SIZE = 180;
        const heldKeys = new Set();
        let hitstop = 0, active = false;

        const P1_IMG = new Image(); const P2_IMG = new Image(); 
        const cache = "?v=" + new Date().getTime();
        P1_IMG.src = "lotus.png" + cache; P2_IMG.src = "dragon.png" + cache;

        const FRAME_COUNTS = { idle: 10, walk: 10, jump: 10, punch: 10, kick: 10, roll: 10, hit: 4 };
        const ANIMS = { idle: 0, walk: 1, jump: 2, punch: 3, kick: 4, roll: 5, hit: 0 };

        class Fighter {
            constructor(x, id, img, isPlayer) {
                this.x = x; this.y = GROUND_Y; this.vx = 0; this.vy = 0; this.hp = 100;
                this.img = img; this.state = "idle"; this.facing = isPlayer ? 1 : -1; this.isPlayer = isPlayer;
                this.frame = 0; this.timer = 0;
            }
            takeDamage(amt, attacker) {
                this.hp = Math.max(0, this.hp - amt); this.state = "hit";
                this.vx = attacker.facing * 12; hitstop = 6;
                document.getElementById(this.isPlayer ? "p1-hp" : "p2-hp-bar").style.width = this.hp + "%";
                setTimeout(() => { if(this.hp > 0) this.state = "idle"; }, 300);
            }
            update(opponent) {
                if (this.isPlayer) {
                    if (!["punch", "kick", "hit"].includes(this.state)) {
                        const L = heldKeys.has("Left"), R = heldKeys.has("Right");
                        if (L) { this.vx = -6; this.state = "walk"; }
                        else if (R) { this.vx = 6; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                        if (heldKeys.has("Up") && this.y >= GROUND_Y) { this.vy = -16; this.state = "jump"; }
                    }
                } else {
                    // 🛠️ 지능형 AI 업그레이드
                    const d = Math.abs(this.x - opponent.x);
                    
                    if (this.state !== "hit") {
                        if (d > 100) { 
                            // 거리 좁히기
                            this.vx = this.x < opponent.x ? 3.5 : -3.5; 
                            this.state = "walk"; 
                        } else {
                            // 거리 안에 들어오면 공격 비중 대폭 상향
                            this.vx = 0;
                            const action = Math.random();
                            if (action < 0.08) this.attack(opponent, "punch");
                            else if (action < 0.13) this.attack(opponent, "kick");
                            else this.state = "idle";
                        }
                    }
                }
                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; if(this.state === "jump") this.state = "idle"; }
                this.x = Math.max(30, Math.min(482, this.x));
                this.facing = this.x < opponent.x ? 1 : -1;
                if (Date.now() - this.timer > 70) { this.frame = (this.frame + 1) % 10; this.timer = Date.now(); }
            }
            attack(target, type) { 
                if (["punch", "kick", "hit"].includes(this.state)) return;
                this.state = type; 
                if (Math.abs(this.x - target.x) < 110) target.takeDamage(10, this); 
                setTimeout(() => { if(this.state === type) this.state = "idle"; }, 300); 
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); 
                
                // 🛠️ 머리 위 1P / CPU 표시 추가
                ctx.font = "bold 16px 'Public Sans'";
                ctx.textAlign = "center";
                ctx.fillStyle = this.isPlayer ? "#00f3ff" : "#ff00ff";
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fillText(this.isPlayer ? "1P" : "CPU", 0, -DRAW_SIZE - 20);
                ctx.shadowBlur = 0;

                ctx.scale(this.facing, 1);
                if (this.state === "hit") ctx.filter = "brightness(4)";
                if (this.img.complete && this.img.width > 10) {
                    if (this.img.width > this.img.height * 2) {
                        const sw = this.img.width / 10, sh = this.img.height / 6;
                        ctx.drawImage(this.img, this.frame * sw, ANIMS[this.state] * sh, sw, sh, -DRAW_SIZE/2, -DRAW_SIZE, DRAW_SIZE, DRAW_SIZE);
                    } else {
                        const ratio = this.img.width / this.img.height;
                        const w = DRAW_SIZE * ratio;
                        ctx.drawImage(this.img, -w/2, -DRAW_SIZE, w, DRAW_SIZE);
                    }
                } else {
                    ctx.fillStyle = this.isPlayer ? "#00f3ff" : "#ff00ff";
                    ctx.fillText("FILE ERROR", -30, -100);
                }
                ctx.restore();
            }
        }

        let p1, p2;
        function loop() {
            if (hitstop > 0) { hitstop--; requestAnimationFrame(loop); return; }
            ctx.fillStyle = "#0a0a0c"; ctx.fillRect(0, 0, 512, 288);
            p1.update(p2); p2.update(p1);
            p1.draw(); p2.draw();
            if (active) requestAnimationFrame(loop);
        }

        const bind = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener("pointerdown", (e) => { e.preventDefault(); heldKeys.add(key); });
            el.addEventListener("pointerup", (e) => { e.preventDefault(); heldKeys.delete(key); });
            el.addEventListener("pointerleave", (e) => { e.preventDefault(); heldKeys.delete(key); });
        };
        
        document.getElementById("start-btn").onclick = () => {
            document.getElementById("vs-screen").remove();
            document.getElementById("ui-layer").classList.remove("hidden");
            p1 = new Fighter(120, "P1", P1_IMG, true); p2 = new Fighter(390, "CPU", P2_IMG, false);
            bind("up", "Up"); bind("down", "Down"); bind("left", "Left"); bind("right", "Right");
            
            document.getElementById("btn-p").addEventListener("pointerdown", (e) => { e.preventDefault(); p1.attack(p2, "punch"); });
            document.getElementById("btn-k").addEventListener("pointerdown", (e) => { e.preventDefault(); p1.attack(p2, "kick"); });
            
            active = true; loop();
        };
    </script>
</body>
</html>
