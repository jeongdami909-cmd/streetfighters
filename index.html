<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>STREET CODING FIGHTER v12.0 - THE ARTISTIC ENGINE</title>
<style>
    body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { border: 5px solid #444; box-shadow: 0 0 100px rgba(0,0,0,1); }
</style>
</head>
<body>

<canvas id="game" width="960" height="540"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 1. 사운드 시스템 (튜토리얼 6편 이후 필수 요소)
const sounds = {
    hit: new Audio('https://actions.google.com/sounds/v1/impacts/crash_metal.ogg'),
    bgm: new Audio('https://actions.google.com/sounds/v1/ambient/dark_scifi_drone.ogg') // 고딕록 풍 배경음
};

const GRAVITY = 0.8;
const GROUND_Y = 480;
let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

class Fighter {
    constructor(x, color, name, controls) {
        this.x = x; this.y = GROUND_Y;
        this.vx = 0; this.vy = 0;
        this.color = color; this.name = name; this.controls = controls;
        this.hp = 100; this.state = "idle";
        this.facing = x < 480 ? 1 : -1;
        this.frame = 0;
        this.width = 70; this.height = 150;
    }

    // 튜토리얼 5편 기반: 정교한 박스 판정
    getPushBox() { return { x: this.x - 25, y: this.y - 120, w: 50, h: 120 }; }
    getHurtBoxes() { return [{ x: this.x - 30, y: this.y - 150, w: 60, h: 150 }]; }
    getHitBox() { 
        if (this.state !== "attack") return null;
        return { x: this.x + (this.facing * 50), y: this.y - 120, w: 60, h: 40 }; 
    }

    update(opponent) {
        if (this.hp <= 0) return;

        // 이동 및 점프 로직
        if (this.state !== "attack" && this.state !== "hit") {
            if (keys[this.controls.right]) { this.vx = 5; this.facing = 1; this.state = "walk"; }
            else if (keys[this.controls.left]) { this.vx = -5; this.facing = -1; this.state = "walk"; }
            else { this.vx = 0; this.state = "idle"; }

            if (keys[this.controls.up] && this.y >= GROUND_Y) { this.vy = -18; this.state = "jump"; }
            if (keys[this.controls.attack]) { 
                this.state = "attack"; 
                setTimeout(() => this.state = "idle", 300); 
            }
        }

        this.vy += GRAVITY;
        this.x += this.vx; this.y += this.vy;
        if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; }

        // 충돌 및 데미지 판정
        const hit = this.getHitBox();
        const opponentHurts = opponent.getHurtBoxes();
        if (hit) {
            opponentHurts.forEach(hurt => {
                if (hit.x < hurt.x + hurt.w && hit.x + hit.w > hurt.x &&
                    hit.y < hurt.y + hurt.h && hit.y + hit.h > hurt.y && opponent.state !== "hit") {
                    opponent.takeDamage(10);
                }
            });
        }
    }

    takeDamage(amt) {
        this.hp -= amt;
        this.state = "hit";
        sounds.hit.currentTime = 0;
        sounds.hit.play().catch(() => {}); // 사운드 출력!
        setTimeout(() => this.state = "idle", 400);
    }

    draw() {
        ctx.save();
        // 실제 캐릭터처럼 보이기 위한 시각적 보정
        const charColor = this.state === "hit" ? "white" : this.color;
        ctx.fillStyle = charColor;
        
        // 공격 시 몸이 기울어지는 연출 (크리스찬 베일의 Equilibrium 느낌!)
        if (this.state === "attack") ctx.translate(this.facing * 20, 0);
        
        // 캐릭터 본체
        ctx.fillRect(this.x - this.width/2, this.y - this.height, this.width, this.height);
        
        // 이름 표시
        ctx.fillStyle = "white";
        ctx.font = "bold 16px Courier New";
        ctx.fillText(this.name, this.x - 30, this.y - 165);
        ctx.restore();
    }
}

const p1 = new Fighter(200, "cyan", "KEN", { left: 'a', right: 'd', up: 'w', attack: 'f' });
const p2 = new Fighter(760, "magenta", "CHUN-LI", { left: 'j', right: 'l', up: 'i', attack: 'h' });

function drawHUD() {
    // 90년대 오락실 스타일의 체력바 (v2.0 UI 계승)
    ctx.fillStyle = "#333";
    ctx.fillRect(50, 40, 350, 30); ctx.fillRect(560, 40, 350, 30);
    ctx.fillStyle = "#39ff14";
    ctx.fillRect(50, 40, p1.hp * 3.5, 30);
    ctx.fillRect(910, 40, -p2.hp * 3.5, 30);
}

function loop() {
    // 모네의 '노을' 느낌을 담은 배경 그라디언트
    const sky = ctx.createLinearGradient(0, 0, 0, 540);
    sky.addColorStop(0, "#1a1a2e"); sky.addColorStop(0.5, "#000"); sky.addColorStop(1, "#6a5acd");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, 960, 540);

    p1.update(p2); p2.update(p1);
    p1.draw(); p2.draw();
    drawHUD();
    requestAnimationFrame(loop);
}

// 사운드 활성화를 위한 첫 클릭 이벤트
window.addEventListener("mousedown", () => { sounds.bgm.play(); loop(); }, { once: true });
ctx.fillStyle = "white"; ctx.font = "30px Courier New";
ctx.fillText("CLICK TO START ENGINE", 300, 270);
</script>
</body>
</html>
