<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>STREET CODING FIGHTER v6.0 - SF2 ENGINE</title>
<style>
:root { --neon-green: #39ff14; --neon-red: #ff073a; --neon-blue: #00f3ff; }
body { margin: 0; background: #0f0f1b; font-family: 'Courier New', monospace; color: white; overflow: hidden; text-align: center; }
.top-ui { display: flex; justify-content: space-between; padding: 20px 50px; }
.hp-box { width: 300px; height: 25px; border: 3px solid #fff; background: #000; overflow: hidden; }
.hp-bar { height: 100%; width: 100%; background: var(--neon-green); transition: width 0.3s; }
#timer { font-size: 3rem; text-shadow: 0 0 10px #fff; }

#stage { display: flex; justify-content: space-around; align-items: flex-end; height: 350px; perspective: 1000px; }
/* SF2 튜토리얼의 스프라이트 로직을 구현한 캐릭터 스타일 */
.character { font-size: 8rem; position: relative; transition: transform 0.2s; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
.character.flipped { transform: scaleX(-1); } /* 방향 전환 로직 */

#input { margin-top: 30px; padding: 15px; font-size: 1.5rem; background: #000; color: var(--neon-green); border: 3px solid var(--neon-green); text-align: center; width: 400px; outline: none; }
#gauge-box { width: 80%; margin: 20px auto; height: 10px; border: 2px solid var(--neon-blue); background: #000; }
#gauge { height: 100%; width: 0%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); transition: width 0.3s; }
#ko { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 8rem; color: var(--neon-red); display: none; z-index: 100; text-shadow: 0 0 20px #000; }
</style>
</head>
<body>

<h1>STREET CODING FIGHTER v6.0</h1>

<div class="top-ui">
    <div>PLAYER<div class="hp-box"><div id="pHP" class="hp-bar"></div></div></div>
    <div id="timer">90</div>
    <div>ENEMY<div class="hp-box"><div id="eHP" class="hp-bar"></div></div></div>
</div>

<div id="stage">
    <div id="player" class="character">🧑‍💻</div>
    <div id="enemy" class="character">👾</div>
</div>

<div id="gauge-box"><div id="gauge"></div></div>
<input id="input" placeholder="a: ATK | s: SMASH | d: GUARD | dd: DASH" autocomplete="off" autofocus>
<div id="ko">KO!</div>

<script>
// SF2 튜토리얼 기반 애니메이션 데이터 구조
const animData = {
    idle: { frames: ["🧑‍💻", "👨‍💻"], speed: 30 }, // 프레임 속도 제어
    attack: { frames: ["👊", "🤜", "🧑‍💻"], speed: 10, next: "idle" },
    smash: { frames: ["🔥", "☄️", "💥", "🧑‍💻"], speed: 12, next: "idle" },
    hit: { frames: ["🤕", "😵"], speed: 15, next: "idle" },
    guard: { frames: ["🛡️"], speed: 50, next: "idle" },
    dash: { frames: ["💨", "🏃"], speed: 8, next: "idle" }
};

let pState = "idle", eState = "idle";
let pFrame = 0, eFrame = 0;
let pTick = 0, eTick = 0;
let pHP = 100, eHP = 100, time = 90, gauge = 0, isGuard = false;

function updateAnimation(char, stateObj, frameRef, tickRef) {
    tickRef.val++;
    if (tickRef.val >= animData[stateObj.val].speed) {
        tickRef.val = 0;
        frameRef.val++;
        if (frameRef.val >= animData[stateObj.val].frames.length) {
            if (animData[stateObj.val].next) {
                stateObj.val = animData[stateObj.val].next;
                frameRef.val = 0;
            } else {
                frameRef.val = 0;
            }
        }
        document.getElementById(char).innerText = animData[stateObj.val].frames[frameRef.val];
    }
}

// 메인 게임 루프 (튜토리얼의 requestAnimationFrame 방식 응용)
function gameLoop() {
    if (pHP <= 0 || eHP <= 0) return;

    // 객체 참조를 위한 래퍼
    let pS = {val: pState}, pF = {val: pFrame}, pT = {val: pTick};
    let eS = {val: eState}, eF = {val: eFrame}, eT = {val: eTick};

    updateAnimation("player", pS, pF, pT);
    updateAnimation("enemy", eS, eF, eT);

    pState = pS.val; pFrame = pF.val; pTick = pT.val;
    eState = eS.val; eFrame = eF.val; eTick = eT.val;

    requestAnimationFrame(gameLoop);
}

// 입력 처리 및 상태 전환
document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") {
        const cmd = e.target.value.trim().toLowerCase();
        e.target.value = "";
        
        if (cmd === 'a') { pState = "attack"; eHP -= 5; gauge += 10; }
        else if (cmd === 's') { pState = "smash"; eHP -= 15; gauge += 20; }
        else if (cmd === 'd') { pState = "guard"; isGuard = true; setTimeout(() => isGuard = false, 500); }
        else if (cmd === 'dd') { pState = "dash"; }

        gauge = Math.min(100, gauge);
        document.getElementById("eHP").style.width = eHP + "%";
        document.getElementById("gauge").style.width = gauge + "%";
    }
});

// 타이머 및 AI
setInterval(() => { if (time > 0 && pHP > 0 && eHP > 0) { time--; document.getElementById("timer").innerText = time; } }, 1000);
setInterval(() => { 
    if (pHP > 0 && eHP > 0 && pState !== "dash") {
        pHP -= isGuard ? 2 : 10;
        pState = isGuard ? "guard" : "hit";
        document.getElementById("pHP").style.width = pHP + "%";
    }
}, 3000);

gameLoop();
</script>
</body>
</html>
