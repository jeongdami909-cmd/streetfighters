<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>STREET CODING FIGHTER v9.0 - ARTISTIC REBOOT</title>
<style>
:root {
    --neon-green: #39ff14;
    --neon-red: #ff073a;
    --sunset-gold: #ffcc33;
    --sunset-purple: #6a5acd;
}
body {
    margin: 0;
    /* 모네의 노을 느낌을 담은 그라디언트 배경 */
    background: linear-gradient(180deg, #2c3e50 0%, #000000 70%, #6a5acd 100%);
    font-family: 'Courier New', monospace;
    color: white;
    overflow: hidden;
    height: 100vh;
    display: flex; flex-direction: column; align-items: center;
}
h1 {
    margin-top: 20px; font-size: 2.5rem;
    color: var(--sunset-gold);
    text-shadow: 0 0 15px var(--neon-red);
}
.top-ui { display: flex; justify-content: space-between; width: 90%; padding: 20px; }
.hp-box { width: 300px; height: 30px; border: 3px solid #fff; background: rgba(0,0,0,0.5); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
.hp-bar { height: 100%; width: 100%; background: var(--neon-green); transition: width 0.3s; }
#timer { font-size: 3.5rem; color: var(--sunset-gold); font-weight: bold; }

#stage { 
    display: flex; justify-content: space-around; align-items: flex-end; 
    width: 100%; height: 300px; margin-top: 50px;
    /* 바닥면에 살짝 반사 효과 */
    border-bottom: 5px solid rgba(255,255,255,0.1);
}
.character { font-size: 9rem; position: relative; transition: transform 0.2s; }
.character.flipped { transform: scaleX(-1); }

.input-area { margin-top: 40px; }
#input {
    background: rgba(0,0,0,0.8); color: var(--neon-green);
    border: 4px solid var(--neon-green); padding: 15px; font-size: 1.8rem;
    width: 500px; text-align: center; border-radius: 10px; outline: none;
    box-shadow: 0 0 30px var(--neon-green);
}
.instructions { color: #aaa; margin-top: 15px; font-size: 1rem; }
#ko { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 8rem; color: var(--neon-red); display: none; font-weight: bold; }
</style>
</head>
<body>

<h1>STREET CODING FIGHTER</h1>

<div class="top-ui">
    <div>PLAYER (KEN)<div class="hp-box"><div id="pHP" class="hp-bar"></div></div></div>
    <div id="timer">90</div>
    <div>RIVAL (CHUN-LI)<div class="hp-box"><div id="eHP" class="hp-bar"></div></div></div>
</div>

<div id="stage">
    <div id="player" class="character">🧑‍💻</div>
    <div id="enemy" class="character">👾</div>
</div>

<div class="input-area">
    <input id="input" placeholder="READY TO FIGHT?" autocomplete="off" autofocus>
    <div class="instructions">h: HADOUKEN | a: ATTACK | s: SMASH | d: GUARD</div>
</div>

<div id="ko">K.O.</div>

<script>
// 튜토리얼 4편 기반: 라이벌 캐릭터(P2) 상태 로직 및 미러링
let pHP = 100, eHP = 100, time = 90, isGameOver = false;
let pPosX = 0; // 플레이어 위치

function updateMirroring() {
    const player = document.getElementById("player");
    const enemy = document.getElementById("enemy");
    
    // 플레이어가 적의 오른쪽에 있으면 적은 오른쪽을 봐야 함 (scaleX flip)
    if (pPosX > window.innerWidth / 2) {
        enemy.classList.remove("flipped");
    } else {
        enemy.classList.add("flipped");
    }
}

function damageEnemy(amt) {
    if (isGameOver) return;
    eHP = Math.max(0, eHP - amt);
    document.getElementById("eHP").style.width = eHP + "%";
    document.body.style.backgroundColor = "#441111"; // 히트 플래시
    setTimeout(() => document.body.style.background = "", 100);
    checkGameOver();
}

function checkGameOver() {
    if (pHP <= 0 || eHP <= 0) {
        isGameOver = true;
        document.getElementById("ko").style.display = "block";
        document.getElementById("input").disabled = true;
    }
}

document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !isGameOver) {
        const cmd = e.target.value.trim().toLowerCase();
        e.target.value = "";
        
        if (cmd === 'h') {
            document.getElementById("player").innerText = "👐";
            setTimeout(() => { document.getElementById("player").innerText = "🧑‍💻"; damageEnemy(15); }, 300);
        } else if (cmd === 'a') {
            damageEnemy(5);
        }
    }
});

// 타이머
setInterval(() => {
    if (time > 0 && !isGameOver) {
        time--;
        document.getElementById("timer").innerText = time;
    }
}, 1000);
</script>
</body>
</html>
