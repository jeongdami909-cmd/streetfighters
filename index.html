<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Nexus Strike: Full Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#00f2ff", "background-dark": "#050505" } } } }
    </script>
    <style>
        /* 🛠️ 최종 해결: 100dvh 적용 */
        html, body { height: 100dvh; margin: 0; padding: 0; background: #050505; overflow: hidden; touch-action: manipulation; font-family: 'Public Sans', sans-serif; }
        canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; image-rendering: pixelated; object-fit:contain; }
        
        /* 🛠️ 모바일 잘림 방지 컨테이너 */
        #ui-layer { position: relative; z-index: 50; width: 100%; height: 100dvh; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .btn:active { background: #00f2ff; color: #000; transform: scale(0.9); }
    </style>
</head>
<body class="text-white select-none">

    <div id="vs-screen" class="interactive fixed inset-0 z-[100] bg-background-dark flex flex-col items-center justify-center transition-opacity duration-500 min-h-[100dvh]">
        <div class="flex gap-6 items-center">
            <div class="text-center">
                <div class="size-40 border-2 border-primary rounded-lg bg-cover" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAk4gjewnysuC4jHejZLL-CnVyOTKGLTwatIpA1N6bSfDVt2QxdQsW-JaNJNXSglfgIE511mLmoM9gRzh5DfAjIW0pySv397FE4JuzEqlKkxYBRidpoqD-MCKGcr4LoKOcDOnEQ60PQVUWAHOG4Ck6zzAG9T-MVOP7UHqL-BsNPWOvKF9DmjEzDQv-HDWhpuogdk_EIYSzUBbnjaxZnpFhD-0hRgr3mPI7CHsSEDH1qIie5RpW7cvxeBCRBUXtZgfT_F0c0Rl2KJjV1');"></div>
                <h1 class="text-3xl font-black italic mt-4 text-primary">KAI</h1>
            </div>
            <div class="text-5xl font-black italic">VS</div>
            <div class="text-center">
                <div class="size-40 border-2 border-red-500 rounded-lg bg-cover" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBuPdanKJbkdOYaT3-IZH-6c2_1EH8e9i3hf7xpii8jObmiVU_mGrASl1jNhiLSX1YKFwtgvSa5AEUKH0EqTqe45fhjal-Uz17mMxbkD1VVt8MkemIYtQdtNWZaVxfbPUTTzB9QiMyh88dsk0Sw3jAsr1WQSgIfEXF7QSMHWqP16jSxNzB5pvichtq-MACtTWCnH5De3tJxFRLDmm4kvVcKAZ6LaUGwV98UPGhd9LwQ0fLZY0vXpSkINZ56DL4pqlflBiyG4oDNMTUq');"></div>
                <h1 class="text-3xl font-black italic mt-4 text-red-500">KAEL</h1>
            </div>
        </div>
        <button id="start-btn" class="mt-10 px-12 py-4 bg-primary text-black font-black text-xl rounded shadow-[0_0_30px_#00f2ff]">ENGAGE BATTLE</button>
    </div>

    <div id="ui-layer">
        <div id="hud" class="hidden absolute top-6 inset-x-0 px-6 flex justify-between">
            <div class="w-1/3"><div class="h-3 bg-black/40 border border-white/10"><div id="p1-hp" class="h-full bg-primary" style="width: 100%"></div></div></div>
            <div class="bg-black/60 border-x-2 border-primary px-4 py-1 text-2xl font-black italic">99</div>
            <div class="w-1/3 flex flex-row-reverse"><div id="p2-hp" class="h-3 bg-red-500" style="width: 100%"></div></div>
        </div>

        <div id="controls" class="hidden absolute bottom-12 inset-x-0 px-8 flex justify-between items-end">
            <div class="grid grid-cols-3 gap-2 interactive">
                <div></div><button id="up" class="size-14 bg-white/10 rounded-lg border border-white/20">▲</button><div></div>
                <button id="left" class="size-14 bg-white/10 rounded-lg border border-white/20">◀</button>
                <button id="down" class="size-14 bg-white/10 rounded-lg border border-white/20">▼</button>
                <button id="right" class="size-14 bg-white/10 rounded-lg border border-white/20">▶</button>
            </div>
            <div class="flex gap-4 interactive">
                <button id="btn-p" class="size-16 rounded-full border-2 border-primary bg-black/40 text-primary font-black italic">P</button>
                <button id="btn-k" class="size-16 rounded-full border-2 border-primary bg-black/40 text-primary font-black italic">K</button>
            </div>
        </div>
    </div>

    <canvas id="game" width="384" height="224"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const GROUND_Y = 195;
        const heldKeys = new Set();
        let hitstop = 0;

        // 🛠️ 팔다리 움직임을 위한 스프라이트 맵핑
        const SPRITES = {
            bg: new Image(),
            // 13:Idle, 14-15:Walk, 16:Jump, 17-18:Punch, 19-20:Kick, 21-23:Special
            p1: Array.from({length: 11}, (_, i) => { const img = new Image(); img.src = `http://googleusercontent.com/profile/picture/${13 + i}`; return img; }),
            p2: new Image()
        };
        SPRITES.bg.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBqxvGMkpkIc9bUxOOhYj3MALyCCXoUTlWmjgZa_PoaWkrdHXTgZoFK9z3GFLPnQV0gNavZwMzBQu_Yjg6kBDfNkWBP1KCO3PVzqIrVtg7zkxJS2CPQCrc5sMgkebFVy-XDUGDNckTRUQqas54fGjA24j30B13LJhPQ9T3jHYlyuPjq9OIcT41BNPOkWsSFTaOULhPpaVwVeiEHk74KcyZDbB1NIxdoTNBCsJ7xrz77dqbNhBc_lKC4cOWWHsx5OKD53vApgFQU79A";
        SPRITES.p2.src = "https://lh3.googleusercontent.com/aida-public/AB6AXuBuPdanKJbkdOYaT3-IZH-6c2_1EH8e9i3hf7xpii8jObmiVU_mGrASl1jNhiLSX1YKFwtgvSa5AEUKH0EqTqe45fhjal-Uz17mMxbkD1VVt8MkemIYtQdtNWZaVxfbPUTTzB9QiMyh88dsk0Sw3jAsr1WQSgIfEXF7QSMHWqP16jSxNzB5pvichtq-MACtTWCnH5De3tJxFRLDmm4kvVcKAZ6LaUGwV98UPGhd9LwQ0fLZY0vXpSkINZ56DL4pqlflBiyG4oDNMTUq";

        const ANIMS = {
            idle: [0],
            walk: [1, 2],
            punch: [4, 5],
            kick: [6, 7]
        };

        class Fighter {
            constructor(x, id, isPlayer) {
                this.x = x; this.y = GROUND_Y; this.vx = 0; this.vy = 0;
                this.hp = 100; this.state = "idle"; this.frame = 0;
                this.timer = 0; this.facing = isPlayer ? 1 : -1;
                this.isPlayer = isPlayer; this.isHit = false;
            }

            takeDamage(amt, attacker) {
                this.hp = Math.max(0, this.hp - amt);
                this.isHit = true;
                hitstop = 4; // 타격 시 순간 정지
                document.getElementById(this.isPlayer ? "p1-hp" : "p2-hp").style.width = this.hp + "%";
                setTimeout(() => this.isHit = false, 200);
            }

            update(t, target) {
                if (this.isPlayer) {
                    if (!["punch", "kick"].includes(this.state)) {
                        const isL = heldKeys.has("Left"); const isR = heldKeys.has("Right");
                        if (isL) { this.vx = -4; this.state = "walk"; }
                        else if (isR) { this.vx = 4; this.state = "walk"; }
                        else { this.vx = 0; this.state = "idle"; }
                    }
                } else {
                    // AI 추격
                    const d = Math.abs(this.x - target.x);
                    if (d > 60) { this.vx = this.x < target.x ? 1.5 : -1.5; this.state = "walk"; }
                    else { this.vx = 0; if(Math.random() < 0.03) this.attack(target, "punch"); else this.state = "idle"; }
                }

                this.x += this.vx;
                this.x = Math.max(30, Math.min(354, this.x));
                this.facing = this.x < target.x ? 1 : -1;

                // 🛠️ 팔다리 움직임 루프 (120ms 간격 프레임 교체)
                if (Date.now() - this.timer > 120) {
                    const seq = ANIMS[this.state];
                    this.frame = (this.frame + 1) % seq.length;
                    this.timer = Date.now();
                    // 공격 프레임이 끝나면 idle 복귀
                    if (["punch", "kick"].includes(this.state) && this.frame === 0) this.state = "idle";
                }
            }

            attack(target, type) {
                if (this.state === "punch" || this.state === "kick") return;
                this.state = type; this.frame = 0;
                if (Math.abs(this.x - target.x) < 60) target.takeDamage(10, this);
            }

            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.facing, 1);
                const imgIdx = ANIMS[this.state][this.frame];
                const img = this.isPlayer ? SPRITES.p1[imgIdx] : SPRITES.p2;
                if (this.isHit) ctx.filter = "brightness(3)";
                ctx.drawImage(img, -32, -64, 64, 64);
                ctx.restore();
            }
        }

        let p1, p2, active = false;
        function loop() {
            if (hitstop > 0) { hitstop--; requestAnimationFrame(loop); return; }
            ctx.drawImage(SPRITES.bg, 0, 0, 384, 224);
            p1.update(null, p2); p2.update(null, p1);
            p1.draw(); p2.draw();
            if (active) requestAnimationFrame(loop);
        }

        const setup = (id, key) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); heldKeys.add(key); };
            el.onpointerup = (e) => { e.preventDefault(); heldKeys.delete(key); };
        };

        document.getElementById("start-btn").onclick = () => {
            document.getElementById("vs-screen").classList.add("hidden");
            document.getElementById("hud").classList.remove("hidden");
            document.getElementById("controls").classList.remove("hidden");
            p1 = new Fighter(80, "ZERO", true); p2 = new Fighter(300, "KAEL", false);
            setup("left", "Left"); setup("right", "Right"); setup("up", "Up");
            document.getElementById("btn-p").onpointerdown = () => p1.attack(p2, "punch");
            document.getElementById("btn-k").onpointerdown = () => p1.attack(p2, "kick");
            active = true; loop();
        };
    </script>
</body>
</html>
