<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STREET CODING FIGHTER v18.0</title>
<style>
    canvas { image-rendering: pixelated; object-fit: contain; width: 100%; height: 100%; background: #000; }
    body { margin: 0; background: #000; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: #ffcc33; font-family: 'Courier New', monospace; }
    #start-btn { padding: 20px 60px; font-size: 2rem; background: #ff4444; color: white; border: 4px solid #fff; border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px #ff4444; font-weight: bold; }
    #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 500; pointer-events: none; }
    .btn { width: 85px; height: 85px; background: rgba(255,255,255,0.2); border: 4px solid #fff; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; font-size: 1.1rem; user-select: none; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 2.5rem; text-shadow: 0 0 20px red;">STATE MACHINE ENGINE</h1>
    <p>Part 5: Advanced Logic & Moveset</p>
    <button id="start-btn">FIGHT!</button>
</div>

<canvas id="game" width="384" height="224"></canvas>

<div id="controls">
    <div class="btn" id="btn-jump">JUMP</div>
    <div class="btn" id="btn-left">LEFT</div>
    <div class="btn" id="btn-atk">ATK</div>
    <div class="btn" id="btn-right">RIGHT</div>
    <div class="btn" id="btn-crouch">CROUCH</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const GROUND_Y = 190;
const GRAVITY = 0.6; // 튜토리얼 5편의 중력 시스템

// 튜토리얼 5편 기반: 애니메이션 및 프레임 데이터
const ANIMS = {
    idle: ["🧑‍💻", "👨‍💻"],
    walk: ["🏃", "🚶", "🏃", "🚶"],
    jump: ["🆙", "✈️", "🆙"],
    crouch: ["🧘"],
    attack: ["👊", "🤜"],
    hit: ["🤕"]
};

class Fighter {
    constructor(x, id) {
        this.x = x; this.y = GROUND_Y;
        this.vx = 0; this.vy = 0;
        this.hp = 100;
        this.id = id;
        this.frameIndex = 0;
        this.animTimer = 0;
        
        // 🛠️ 튜토리얼 5편의 핵심: 상태 머신 정의
        this.currentState = "idle";
        this.states = {
            idle: { validFrom: ["walk", "jump", "crouch", "attack"], init: () => { this.vx = 0; this.vy = 0; } },
            walk: { validFrom: ["idle"], init: (dir) => { this.vx = dir * 3; } },
            jump: { validFrom: ["idle", "walk"], init: () => { this.vy = -12; } },
            crouch: { validFrom: ["idle"], init: () => { this.vx = 0; } },
            attack: { validFrom: ["idle", "walk"], init: () => { this.vx = 0; } }
        };
    }

    // 상태 전환 함수 (무결성 검사 포함)
    changeState(newState, arg) {
        if (this.currentState === newState) return;
        if (!this.states[newState].validFrom.includes(this.currentState)) return;

        this.currentState = newState;
        this.frameIndex = 0;
        this.states[newState].init(arg);
    }

    update(time, opponent) {
        // 물리 연산 (중력)
        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;

        // 지면 충돌 처리
        if (this.y >= GROUND_Y) {
            this.y = GROUND_Y;
            this.vy = 0;
            if (this.currentState === "jump") this.changeState("idle");
        }

        // 애니메이션 프레임 업데이트
        if (time - this.animTimer > 100) {
            this.frameIndex = (this.frameIndex + 1) % ANIMS[this.currentState].length;
            this.animTimer = time;
            
            // 공격 종료 시 복귀
            if (this.currentState === "attack" && this.frameIndex === 0) this.changeState("idle");
        }
    }

    draw() {
        ctx.save();
        ctx.textAlign = "center"; ctx.textBaseline = "bottom";
        ctx.font = this.currentState === "crouch" ? "40px Arial" : "60px Arial";
        
        const emoji = ANIMS[this.currentState][this.frameIndex];
        ctx.fillText(emoji, this.x, this.y);
        
        // HP 바
        ctx.fillStyle = "#ff4444"; ctx.fillRect(this.x - 20, this.y - 70, 40, 4);
        ctx.fillStyle = "#39ff14"; ctx.fillRect(this.x - 20, this.y - 70, (this.hp/100)*40, 4);
        ctx.restore();
    }
}

const p1 = new Fighter(100, "P1");
const p2 = new Fighter(280, "P2");

function loop(timestamp) {
    const sky = ctx.createLinearGradient(0, 0, 0, 224);
    sky.addColorStop(0, "#1a1a2e"); sky.addColorStop(0.7, "#000"); sky.addColorStop(1, "#6a5acd");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, 384, 224);

    p1.update(timestamp, p2); p2.update(timestamp, p1);
    p1.draw(); p2.draw();
    requestAnimationFrame(loop);
}

// 🛠️ 버튼 조작 로직 (상태 머신 연결)
function bind(id, down, up) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); down(); }, {passive: false});
    el.addEventListener('touchend', (e) => { e.preventDefault(); up(); }, {passive: false});
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
}

bind("btn-left", () => p1.changeState("walk", -1), () => p1.changeState("idle"));
bind("btn-right", () => p1.changeState("walk", 1), () => p1.changeState("idle"));
bind("btn-jump", () => p1.changeState("jump"), () => {});
bind("btn-crouch", () => p1.changeState("crouch"), () => p1.changeState("idle"));
bind("btn-atk", () => p1.changeState("attack"), () => {});

document.getElementById("start-btn").onclick = () => { document.getElementById("overlay").remove(); requestAnimationFrame(loop); };
</script>
</body>
</html>
